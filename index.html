<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pro Wheel</title>
<style>
body{margin:0;background:#000;color:#fff;text-align:center;font-family:sans-serif;}
canvas{margin-top:20px;}
button{padding:12px 25px;background:gold;border:none;border-radius:10px;font-size:18px;}
#pointer{font-size:28px;}
#result{margin-top:10px;font-size:20px;}
#history{margin-top:10px;color:#aaa;}
#popup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);align-items:center;justify-content:center;
}
#win{font-size:40px;animation:flash 1s infinite;}
@keyframes flash{
0%{color:gold;}50%{color:red;}100%{color:gold;}
}
</style>
</head>

<body>

<h2>🎰 PRO CASINO WHEEL</h2>
<div id="pointer">▼</div>

<canvas id="wheel" width="300" height="300"></canvas>

<br>
<button onclick="spin()">SPIN</button>

<div id="result">---</div>
<div id="history">History: </div>

<div id="popup"><div id="win"></div></div>

<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const segments=16;
const angle=2*Math.PI/segments;

let rotation=0;
let history=[];

/* DRAW WHEEL */
function draw(){

ctx.clearRect(0,0,300,300);

for(let i=0;i<segments;i++){

let start=i*angle+rotation;
let end=start+angle;

ctx.beginPath();
ctx.moveTo(150,150);
ctx.arc(150,150,140,start,end);
ctx.fillStyle=i%3==0?"green":i%2==0?"red":"black";
ctx.fill();

ctx.save();
ctx.translate(150,150);
ctx.rotate(start+angle/2);
ctx.fillStyle="#fff";
ctx.fillText(i+1,100,5);
ctx.restore();
}

/* CENTER */
ctx.beginPath();
ctx.arc(150,150,30,0,2*Math.PI);
ctx.fillStyle="gold";
ctx.fill();

}

/* ANIMATION LOOP */
function animate(){
draw();
requestAnimationFrame(animate);
}
animate();

/* SPIN */
let spinning=false;

function spin(){

if(spinning) return;
spinning=true;

document.getElementById("spinSound").play();
if(navigator.vibrate) navigator.vibrate(200);

/* TARGET */
let target=Math.floor(Math.random()*segments);

/* CALCULATE FINAL ANGLE */
let final=(Math.PI*2*5)+(segments-target)*angle;

let start=rotation;
let duration=3000;
let startTime=null;

function easeOut(t){
return 1-Math.pow(1-t,3);
}

function anim(time){

if(!startTime) startTime=time;
let progress=(time-startTime)/duration;

if(progress<1){

rotation=start+(final-start)*easeOut(progress);
requestAnimationFrame(anim);

}else{

rotation=final%(Math.PI*2);
spinning=false;
show(target);

}
}

requestAnimationFrame(anim);
}

/* RESULT */
function show(n){

document.getElementById("result").innerText="🎯 "+(n+1);

document.getElementById("winSound").play();
if(navigator.vibrate) navigator.vibrate(300);

/* HISTORY */
history.unshift(n+1);
if(history.length>6) history.pop();

document.getElementById("history").innerText=
"History: "+history.join(" | ");

/* POPUP */
let p=document.getElementById("popup");
let w=document.getElementById("win");

w.innerText="💥 "+(n+1);
p.style.display="flex";

setTimeout(()=>p.style.display="none",2000);

}

</script>
</body>
</html>
