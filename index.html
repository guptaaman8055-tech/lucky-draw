 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Pro</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}
.win{background:gold !important;color:black;font-weight:bold;}

#wheel{
width:200px;height:200px;border-radius:50%;
border:8px solid white;margin:20px auto;
display:flex;align-items:center;justify-content:center;
transition:transform 3s;
}
</style>
</head>

<body>

<h2>🎉 Lucky Draw Dashboard</h2>

<!-- AUDIO -->
<audio id="bgMusic" src="bg.mp3" loop></audio>
<audio id="tickSound" src="tick.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<div class="box">
<h3>💰 Entry ₹50 | 🏆 Win up to ₹50000</h3>
</div>

<div class="box">
<h3>⏳ Countdown Timer</h3>
<h2 id="timer"></h2>
</div>

<div class="box">
<h3>💳 Payment Panel</h3>
<button onclick="pay()">Pay ₹50</button>
<p id="payStatus">❌ Not Paid</p>
</div>

<div class="box">
<input id="name" placeholder="Enter Name">
</div>

<div class="box">
<h3>Select Number</h3>
<div id="numbers"></div>
<p id="chosen"></p>
</div>

<div class="box">
<button onclick="request()">Submit Entry</button>
</div>

<div class="box">
<h3>🔐 Admin Panel</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<ul id="reqList"></ul>
</div>
</div>

<div class="box">
<h3>🎡 Spin</h3>
<div id="wheel">SPIN</div>
<button onclick="spin()">Spin</button>
</div>

<div class="box">
<h2 id="winner">Result Locked</h2>
</div>

<div class="box">
<h3>📊 Results</h3>
<ul id="results"></ul>
</div>

<script>

let selected=null;
let paid=false;
let users=JSON.parse(localStorage.getItem("users"))||[];
let requests=[];
let drawDone=false;

/* Start background music on first click */
document.body.addEventListener("click", ()=>{
 document.getElementById("bgMusic").volume=0.2;
 document.getElementById("bgMusic").play().catch(()=>{});
},{once:true});

/* Numbers */
let div=document.getElementById("numbers");
for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText=i;
 btn.className="num";

 if(users.find(u=>u.number===i)) btn.classList.add("taken");

 btn.onclick=()=>{
  if(selected) return alert("Only 1 number allowed");
  if(users.find(u=>u.number===i)) return alert("Already taken");

  selected=i;
  btn.classList.add("selected");
  document.getElementById("chosen").innerText="Selected: "+i;
 };

 div.appendChild(btn);
}

/* Payment */
function pay(){
 paid=true;
 document.getElementById("payStatus").innerText="✅ Paid";
}

/* Entry */
function request(){
 let name=document.getElementById("name").value;
 if(!paid) return alert("Payment karo");
 if(!name||!selected) return alert("Fill all");

 requests.push({name,number:selected});
 alert("Request sent");
}

/* Admin */
function login(){
 if(document.getElementById("pass").value==="1234"){
  document.getElementById("admin").style.display="block";
  loadReq();
 }
}

function loadReq(){
 let list=document.getElementById("reqList");
 list.innerHTML="";

 requests.forEach((r,i)=>{
  let li=document.createElement("li");
  li.innerText=r.name+" ("+r.number+")";

  let btn=document.createElement("button");
  btn.innerText="Approve";

  btn.onclick=()=>{
   users.push(r);
   localStorage.setItem("users",JSON.stringify(users));
   requests.splice(i,1);
   location.reload();
  };

  li.appendChild(btn);
  list.appendChild(li);
 });
}

/* Spin */
function spin(){
 let w=document.getElementById("wheel");
 let deg=3600+Math.random()*1000;
 w.style.transform="rotate("+deg+"deg)";
}

/* 🎯 AUTO DRAW */
function autoDraw(){

 let num=Math.floor(Math.random()*15)+1;
 let win=users.find(u=>u.number===num);

 // remove old highlight
 document.querySelectorAll(".num").forEach(b=>{
  b.classList.remove("win");
 });

 // highlight winning number
 document.querySelectorAll(".num")[num-1].classList.add("win");

 let res;
 if(win){
  res="🏆 Winner: "+win.name+" (No: "+num+")";
 } else {
  res="❌ No Winner (Winning No: "+num+")";
 }

 document.getElementById("winner").innerText=res;

 let li=document.createElement("li");
 li.innerText="Winning Number: "+num;
 document.getElementById("results").appendChild(li);

 // 🎉 sound
 document.getElementById("winSound").play();
}

/* Timer */
let end=new Date().getTime()+300000;

setInterval(()=>{
 let now=new Date().getTime();
 let d=end-now;

 let m=Math.floor(d/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("timer").innerText=m+"m "+s+"s";

 // ⏳ last 10 sec sound
 if(d<=10000 && d>0){
  let t=document.getElementById("tickSound");
  t.currentTime=0;
  t.play();
 }

 // 🔥 auto draw after timer
 if(d<=0 && !drawDone){
  document.getElementById("timer").innerText="DRAW DONE";
  drawDone=true;
  autoDraw();
 }

},1000);

</script>

</body>
</html>
