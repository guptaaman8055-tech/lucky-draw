<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Ultra Pro</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}

#wheel{
width:260px;height:260px;border-radius:50%;
border:8px solid white;margin:20px auto;
position:relative;
transition:transform 4s ease-out;
}

.slice{
position:absolute;
width:100%;height:100%;
border-radius:50%;
clip-path: polygon(50% 50%, 100% 0, 100% 100%);
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:flex-end;
padding-right:10px;
font-size:10px;
font-weight:bold;
}

.centerText{
position:absolute;
top:45%;left:50%;
transform:translate(-50%,-50%);
font-size:20px;font-weight:bold;
}

</style>
</head>

<body>

<h2>🎉 Lucky Draw Ultra Pro</h2>

<div class="box">
<h3>💰 Entry ₹50 | 🏆 Total Prize ₹50000</h3>
</div>

<!-- TIMER -->
<div class="box">
<h2 id="timer"></h2>
</div>

<!-- SPIN -->
<div class="box">
<div id="wheel">
<div class="centerText">SPIN</div>
</div>
<button onclick="spin()">Spin</button>
</div>

<!-- RESULT -->
<div class="box">
<h2 id="winner">Result Locked</h2>
<p id="winNumber"></p>
</div>

<script>

/* Prize Map */
const prizeMap={
1:2000,2:3000,3:2500,4:4000,5:1500,
6:3500,7:5000,8:4500,9:3000,10:6000,
11:2000,12:3500,13:2500,14:4000,15:5000
};

/* 🎡 Create Wheel (Number + Amount BOTH) */
let wheel=document.getElementById("wheel");

for(let i=1;i<=15;i++){
 let div=document.createElement("div");
 div.className="slice";
 div.style.transform="rotate("+(i*24)+"deg)";
 div.style.background="hsl("+(i*24)+",70%,60%)";

 // 👇 NUMBER + AMOUNT SHOW
 div.innerHTML="₹"+prizeMap[i]+"<br>#"+i;

 wheel.appendChild(div);
}

/* ⏳ Timer */
let end=new Date().getTime()+30000;

let timer=setInterval(()=>{
 let s=Math.floor((end-new Date().getTime())/1000);

 document.getElementById("timer").innerText=
 s>0? "⏳ "+s+" sec":"🎯 DRAW STARTED";

 if(s<=0){
  clearInterval(timer);
  autoDraw();
 }
},1000);

/* 🎯 Auto Draw */
function autoDraw(){
 let num=Math.floor(Math.random()*15)+1;
 spin(num);
}

/* 🎡 Spin */
function spin(fixed){

 let num=fixed || Math.floor(Math.random()*15)+1;

 let deg=3600+(num*24);

 wheel.style.transform="rotate("+deg+"deg)";

 setTimeout(()=>showWinner(num),4000);
}

/* 🏆 Winner */
function showWinner(num){

 let amt=prizeMap[num];

 document.getElementById("winner").innerText="💰 ₹"+amt;

 // 👇 WINNING NUMBER SHOW
 document.getElementById("winNumber").innerText=
 "🎯 Winning Number: "+num;

}

</script>

</body>
</html>
