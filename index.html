<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Ultra Pro</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}

.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}
.win{background:gold !important;color:black;font-weight:bold;}

#wheel{
width:260px;height:260px;border-radius:50%;
border:8px solid white;margin:20px auto;
position:relative;overflow:hidden;
}

.slice{
position:absolute;width:50%;height:50%;
top:50%;left:50%;
transform-origin:0% 0%;
display:flex;align-items:center;justify-content:center;
font-size:14px;font-weight:bold;color:white;
}

.slice span{transform:rotate(90deg);}

#pointer{
width:0;height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid yellow;
margin:auto;
}

canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<h2>🎉 Lucky Draw Ultra Pro</h2>
<div id="pointer"></div>

<!-- AUDIO -->
<audio id="bgMusic" src="bg.mp3" loop></audio>
<audio id="tickSound" src="tick.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="spinSound" src="spin.mp3"></audio>

<div class="box">
<button onclick="toggleMusic()">🎵 Music ON/OFF</button>
</div>

<div class="box">
<h3>💰 Entry ₹50 | 🏆 Win up to ₹50000</h3>
<p id="earn">Earnings: ₹0</p>
</div>

<div class="box">
<h3>⏳ Timer</h3>
<h2 id="timer"></h2>
</div>

<div class="box">
<button onclick="pay()">Pay ₹50</button>
<p id="payStatus">❌ Not Paid</p>
</div>

<div class="box">
<input id="name" placeholder="Enter Name">
</div>

<div class="box">
<h3>Select Number</h3>
<div id="numbers"></div>
</div>

<div class="box">
<button onclick="request()">Submit Entry</button>
</div>

<div class="box">
<h3>🎡 Spin Wheel</h3>
<div id="wheel"></div>
<button onclick="spin()">Spin</button>
</div>

<div class="box">
<h2 id="winner">Result Locked</h2>
</div>

<div class="box">
<h3>📊 Result History</h3>
<ul id="history"></ul>
</div>

<canvas id="fire"></canvas>

<script>

// ===== BASIC STATE =====
let users=JSON.parse(localStorage.getItem("users"))||[];
let selected=null;
let paid=false;
let finalDeg=0;

// earnings
document.getElementById("earn").innerText="Earnings: ₹"+(users.length*50);

// ===== MUSIC =====
function startMusic(){
 let bg=document.getElementById("bgMusic");
 bg.volume=0.3;
 bg.play().catch(()=>{});
}
document.addEventListener("click",startMusic,{once:true});

function toggleMusic(){
 let bg=document.getElementById("bgMusic");
 if(bg.paused) bg.play(); else bg.pause();
}

// ===== NUMBERS =====
let div=document.getElementById("numbers");

for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText=i;
 btn.className="num";

 if(users.find(u=>u.number===i)) btn.classList.add("taken");

 btn.onclick=()=>{
  if(selected) return alert("Only 1 number");
  if(users.find(u=>u.number===i)) return alert("Taken");
  selected=i;
  btn.classList.add("selected");
 };

 div.appendChild(btn);
}

// ===== PAYMENT =====
function pay(){
 paid=true;
 document.getElementById("payStatus").innerText="✅ Paid (Demo)";
}

// ===== ENTRY =====
function request(){
 let name=document.getElementById("name").value;
 if(!paid) return alert("Payment karo");
 if(!name||!selected) return alert("Fill all");

 users.push({name,number:selected});
 localStorage.setItem("users",JSON.stringify(users));
 location.reload();
}

// ===== WHEEL =====
let wheel=document.getElementById("wheel");

for(let i=1;i<=15;i++){
 let slice=document.createElement("div");
 slice.className="slice";

 let angle=360/15;
 slice.style.transform="rotate("+(i*angle)+"deg) skewY("+(90-angle)+"deg)";
 slice.style.background="hsl("+(i*24)+",70%,40%)";

 let text=document.createElement("span");
 text.innerText="₹"+i;

 slice.appendChild(text);
 wheel.appendChild(slice);
}

// ===== SPIN =====
function spin(){
 document.getElementById("spinSound").play();

 let extra=Math.floor(Math.random()*360);
 finalDeg=3600+extra;

 wheel.style.transition="4s";
 wheel.style.transform="rotate("+finalDeg+"deg)";

 setTimeout(getResult,4000);
}

// ===== RESULT =====
function getResult(){

 let deg=finalDeg%360;
 let num=Math.floor((360-deg)/24)+1;
 if(num>15) num=1;

 let win=users.find(u=>u.number===num);

 document.querySelectorAll(".num").forEach(b=>b.classList.remove("win"));
 document.querySelectorAll(".num")[num-1].classList.add("win");

 let res=win ? "🏆 "+win.name+" (No:"+num+")" : "❌ No Winner ("+num+")";

 document.getElementById("winner").innerText=res;
 document.getElementById("winSound").play();

 // history
 let li=document.createElement("li");
 li.innerText="Winning No: "+num;
 document.getElementById("history").appendChild(li);

 fireworks();
}

// ===== FIREWORKS =====
function fireworks(){
 let c=document.getElementById("fire");
 let ctx=c.getContext("2d");
 c.width=window.innerWidth;
 c.height=window.innerHeight;

 for(let i=0;i<100;i++){
  ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
  ctx.fillRect(Math.random()*c.width,Math.random()*c.height,5,5);
 }
 setTimeout(()=>ctx.clearRect(0,0,c.width,c.height),1500);
}

// ===== TIMER =====
let end=new Date().getTime()+60000;

setInterval(()=>{
 let now=new Date().getTime();
 let d=end-now;

 document.getElementById("timer").innerText=Math.floor(d/1000)+"s";

 if(d<=10000 && d>0){
  let t=document.getElementById("tickSound");
  t.currentTime=0;
  t.play();
 }

},1000);

</script>

</body>
 </html>
