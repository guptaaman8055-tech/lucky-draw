<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw Demo</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#1f2937;
padding:25px;
border-radius:15px;
text-align:center;
width:320px;
box-shadow:0 0 20px rgba(255,215,0,.3);
}
h2{color:gold;}
button{
padding:12px 20px;
border:none;
border-radius:8px;
background:gold;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}
#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
#history{
margin-top:15px;
color:#ccc;
font-size:14px;
}
</style>
</head>
<body>

<div class="card">
<h2>🎯 Lucky Draw Demo</h2>

<p>Click the button to generate a random number.</p>

<button onclick="play()">PLAY</button>

<div id="result">Waiting...</div>

<div id="history">History:</div>

</div>

<script>

let history=[];

function play(){

let num=Math.floor(Math.random()*20)+1;

document.getElementById("result").innerHTML=
"🎉 Lucky Number : <b>"+num+"</b>";

history.unshift(num);

if(history.length>10) history.pop();

document.getElementById("history").innerHTML=
"History : "+history.join(" | ");

}

</script>

</body>
</html>
