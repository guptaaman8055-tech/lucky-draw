<!DOCTYPE html>
<html>
<head>
  <title>Lucky Draw</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
    }
    button {
      background: green;
      color: white;
      border: none;
    }
  </style>

</head>

<body>

<h2>🎉 Lucky Draw</h2>

<input type="text" id="name" placeholder="Enter name">
<button onclick="addName()">Add</button>

<ul id="list"></ul>

<br>

<!-- PAYMENT BUTTON -->
<button id="payBtn">Pay ₹50</button>

<br><br>

<!-- GOOGLE FORM -->
<h3>Fill Details</h3>
<iframe src="https://docs.google.com/forms/d/e/YOUR_FORM_LINK/viewform?embedded=true"
width="100%" height="400"></iframe>

<br>

<button onclick="pickWinner()">Pick Winner</button>

<h3 id="winner"></h3>

<script>
let users = [];

function addName(){
  let name = document.getElementById("name").value;

  if(name===""){
    alert("Enter name");
    return;
  }

  let ticket = "LD-" + Math.floor(1000 + Math.random()*9000);

  users.push({name: name, ticket: ticket});

  let li = document.createElement("li");
  li.innerText = name + " (Ticket: " + ticket + ")";

  document.getElementById("list").appendChild(li);
  document.getElementById("name").value = "";
}

function pickWinner(){
  if(users.length===0){
    alert("No users");
    return;
  }

  let random = Math.floor(Math.random()*users.length);
  let winner = users[random];

  document.getElementById("winner").innerText =
    "🏆 Winner: " + winner.name + " (Ticket: " + winner.ticket + ")";
}
</script>

</body>
</html>
