<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lightning VIP</title>

<style>
body{
margin:0;
background:#0b0f1a;
font-family:sans-serif;
color:#fff;
text-align:center;
}

/* TIMER RING */
.ring{
width:80px;
height:80px;
border-radius:50%;
border:6px solid #333;
border-top:6px solid gold;
margin:10px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.num{
padding:18px;
background:#111;
border-radius:8px;
font-size:18px;
transition:0.2s;
border:1px solid gold;
}

.light{
background:gold;
color:black;
transform:scale(1.2);
box-shadow:0 0 20px gold;
}

/* RESULT */
#result{
font-size:24px;
margin:10px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.win{
font-size:40px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}
</style>

</head>
<body>

<h2>⚡ VIP Lightning</h2>

<div class="ring" id="ring"></div>

<div class="grid" id="grid"></div>

<div id="result">---</div>

<div id="popup">
<div class="win" id="win"></div>
</div>

<script>

/* CREATE NUMBERS */
let grid=document.getElementById("grid");
for(let i=1;i<=20;i++){
let d=document.createElement("div");
d.className="num";
d.innerText=i;
grid.appendChild(d);
}

/* MAIN LOOP */
function start(){

setTimeout(()=>{
run();
},3000);

}

/* LIGHTNING RUN */
function run(){

let nums=document.querySelectorAll(".num");

let i=0;
let speed=40;

let loop=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

let index=i%20;
nums[index].classList.add("light");

i++;

/* slow effect */
if(i>40) speed+=5;

if(i>80){
clearInterval(loop);

let winNum=Math.floor(Math.random()*20);
show(winNum);
}

},speed);
}

/* RESULT */
function show(n){

document.getElementById("result").innerText="🎯 "+n;

let popup=document.getElementById("popup");
let win=document.getElementById("win");

win.innerText="💥 "+n;

popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
start();
},2500);
}

/* START LOOP */
start();

</script>

</body>
</html>
