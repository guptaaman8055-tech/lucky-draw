<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIP Lightning</title>

<style>
body{
margin:0;
background:#0b0f1a;
font-family:sans-serif;
color:#fff;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.num{
padding:18px;
border-radius:8px;
font-size:18px;
transition:0.2s;
}

/* COLORS */
.red{background:#b91c1c;}
.black{background:#111;}
.green{background:#15803d;}

.light{
transform:scale(1.2);
box-shadow:0 0 20px gold;
}

/* RESULT */
#result{
font-size:22px;
margin:10px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.win{
font-size:35px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}
</style>
</head>

<body>

<h2>🎰 VIP Lightning Demo</h2>

<div class="grid" id="grid"></div>

<div id="result">---</div>

<div id="popup">
<div class="win" id="win"></div>
</div>

<script>

/* MULTIPLIERS */
let multipliers={};

/* CREATE NUMBERS */
let grid=document.getElementById("grid");

for(let i=1;i<=20;i++){

let d=document.createElement("div");
d.className="num";

/* COLOR SET */
if(i%3==0) d.classList.add("green");
else if(i%2==0) d.classList.add("red");
else d.classList.add("black");

/* MULTIPLIER */
let multi=Math.floor(Math.random()*20)+1;
multipliers[i]=multi;

d.innerHTML=i+"<br>"+multi+"x";

grid.appendChild(d);
}

/* START */
function start(){
setTimeout(run,2000);
}

/* RUN */
function run(){

let nums=document.querySelectorAll(".num");
let i=0;
let speed=40;

let loop=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

let index=i%20;
nums[index].classList.add("light");

i++;

/* slow */
if(i>40) speed+=5;

if(i>80){
clearInterval(loop);

let winNum=Math.floor(Math.random()*20)+1;
show(winNum);
}

},speed);
}

/* RESULT */
function show(n){

let multi=multipliers[n];

document.getElementById("result").innerText=
"🎯 "+n+" | ⚡ "+multi+"x";

let popup=document.getElementById("popup");
let win=document.getElementById("win");

win.innerText="💥 "+n+" → "+multi+"x";

popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
start();
},2500);
}

/* AUTO START */
start();

</script>

</body>
</html>
