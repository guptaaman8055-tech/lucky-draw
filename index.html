<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw Demo</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:#fff;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.header{
  text-align:center;
  background:linear-gradient(135deg,#1e293b,#111827);
  padding:25px;
  border-radius:18px;
}
.header h1{
  color:#ffd700;
  margin:0 0 8px;
}
button{
  padding:14px 25px;
  border:0;
  border-radius:10px;
  background:#ffd700;
  color:#111;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}
.tickets{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:20px;
}
.ticket{
  background:linear-gradient(135deg,#1e40af,#7c3aed);
  border:2px dashed #ffd700;
  border-radius:12px;
  padding:15px;
  text-align:center;
  transition:.3s;
}
.ticket:hover{
  transform:translateY(-5px);
}
.ticket .icon{
  font-size:35px;
}
.ticket .number{
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
  margin-top:8px;
}
.winner{
  display:none;
  margin-top:25px;
  padding:25px;
  text-align:center;
  background:#172033;
  border-radius:15px;
  border:2px solid #ffd700;
}
.winner h2{
  color:#ffd700;
}
.selected{
  animation:blink 1s infinite;
  border-color:#22c55e;
}
@keyframes blink{
  50%{transform:scale(1.08)}
}
.note{
  color:#aaa;
  text-align:center;
  margin-top:15px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>🎟️ LUCKY DRAW DEMO</h1>
  <p>100 Virtual Tickets</p>
  <button onclick="drawWinner()">🎁 Start Demo Draw</button>
</div>

<div id="tickets" class="tickets"></div>

<div id="winner" class="winner">
  <h2>🏆 DEMO WINNER 🏆</h2>
  <div id="winnerNumber"></div>
</div>

<p class="note">
यह केवल मनोरंजन और डेमो के लिए है। इन टिकटों का कोई वास्तविक मौद्रिक मूल्य नहीं है।
</p>

</div>

<script>

const ticketsBox =
document.getElementById("tickets");

for(let i=1;i<=100;i++){

  const ticket =
  document.createElement("div");

  ticket.className="ticket";

  ticket.id="ticket-"+i;

  ticket.innerHTML=`
    <div class="icon">🎟️</div>
    <div>LUCKY TICKET</div>
    <div class="number">#${String(i).padStart(3,"0")}</div>
  `;

  ticketsBox.appendChild(ticket);
}

function drawWinner(){

  document
  .querySelectorAll(".ticket")
  .forEach(t=>{
    t.classList.remove("selected");
  });

  const winner =
  Math.floor(Math.random()*100)+1;

  const selected =
  document.getElementById(
    "ticket-"+winner
  );

  selected.classList.add("selected");

  document.getElementById(
    "winnerNumber"
  ).innerHTML=
  "🎟️ Ticket #"+
  String(winner).padStart(3,"0");

  document.getElementById(
    "winner"
  ).style.display="block";

  selected.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });
}

</script>

</body>
</html>
