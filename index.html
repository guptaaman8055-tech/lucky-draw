<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIP 3D Spin Wheel</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#020617,#000);
color:white;
text-align:center;
}

/* TITLE */
h2{
text-shadow:0 0 15px #22c55e;
}

/* WHEEL */
#wheel{
width:280px;
height:280px;
margin:40px auto;
border-radius:50%;
position:relative;
border:8px solid #22c55e;
box-shadow:0 0 40px #22c55e;
transition:transform 4s cubic-bezier(.17,.67,.83,.67);
}

/* SLICES */
.slice{
position:absolute;
width:100%;
height:100%;
clip-path: polygon(50% 50%, 100% 0, 100% 100%);
border-radius:50%;
display:flex;
justify-content:flex-end;
padding-right:10px;
font-size:12px;
font-weight:bold;
}

/* POINTER */
#pointer{
font-size:30px;
margin-top:10px;
}

/* BUTTON */
button{
padding:12px 25px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:18px;
box-shadow:0 0 20px #22c55e;
}

/* RESULT */
#result{
font-size:22px;
margin-top:10px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.bigwin{
font-size:40px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:#22c55e;}
50%{color:#facc15;}
100%{color:#22c55e;}
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
75%{transform:translate(5px)}
100%{transform:translate(0)}
}
.shake{animation:shake 0.4s;}

</style>
</head>

<body>

<h2>🎡 VIP 3D Spin Wheel</h2>

<div id="pointer">▼</div>

<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<div id="result">Result Locked</div>

<div id="popup">
<div class="bigwin" id="winText"></div>
</div>

<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

/* PRIZE */
const prize={
0:0,1:2000,2:3000,3:2500,4:4000,
5:1500,6:3500,7:5000,8:4500,
9:3000,10:6000,11:2000,
12:3500,13:2500,14:4000,15:5000
};

/* CREATE WHEEL */
let wheel=document.getElementById("wheel");

for(let i=0;i<16;i++){
let div=document.createElement("div");
div.className="slice";
div.style.transform="rotate("+(i*22.5)+"deg)";
div.style.background="hsl("+(i*22.5)+",70%,50%)";
div.innerHTML=" "+i;
wheel.appendChild(div);
}

/* SPIN */
function spin(){

document.body.classList.add("shake");
document.getElementById("spinSound").play();

/* RANDOM */
let num=Math.floor(Math.random()*16);

/* ROTATION */
let deg=3600+(num*22.5);

wheel.style.transform="rotate("+deg+"deg)";

/* RESULT */
setTimeout(()=>{
show(num);
},4000);
}

/* SHOW RESULT */
function show(n){

document.body.classList.remove("shake");

let amt=prize[n];

document.getElementById("result").innerText=
"🎯 "+n+" | 💰 ₹"+amt;

document.getElementById("winSound").play();

let popup=document.getElementById("popup");
let text=document.getElementById("winText");

text.innerText="💥 BIG WIN ₹"+amt;

popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
},3000);
}

</script>

</body>
</html>
