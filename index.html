<!DOCTYPE html>
<html>
<head>
<title>Lucky Draw</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
}

.container {
    background: white;
    color: black;
    padding: 20px;
    margin: 50px auto;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    background: #ff9800;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

a {
    text-decoration: none;
    color: white;
    background: #28a745;
    padding: 10px 15px;
    border-radius: 5px;
}

.qr {
    margin-top: 15px;
}
</style>

</head>

<body>

<h1>🎉 Lucky Draw 🎉</h1>

<div class="container">

<h2>Enter Your Name</h2>

<input type="text" id="name" placeholder="Enter Name">
<br><br>

<button onclick="addName()">Add</button>

<ul id="list"></ul>

<br>

<button onclick="pickWinner()">Pick Winner</button>

<h2 id="winner"></h2>

<br><br>

<!-- 💰 PAYMENT SECTION START -->
<h2>Pay Entry Fee</h2>

<p><b>Entry Fee: ₹10</b></p>

<p>UPI ID: <b>amangupta9712@nyes</b></p>

<img class="qr" 
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=amangupta9712@nyes&pn=LuckyDraw&am=10&cu=INR">

<p>📌 Payment karne ke baad hi form fill karein</p>
<!-- 💰 PAYMENT SECTION END -->

<br><br>

<h2>Register for Lucky Draw</h2>

<a href="https://docs.google.com/forms/d/e/1FAIpQLScYmKMR7Ce40LH3NBRkCdWIiZ5MIJokxlXwCVEnEIw4yIh8Cg/viewform" target="_blank">
Register Now
</a>

</div>

<script>
let names = [];

function addName(){
let name = document.getElementById("name").value;
names.push(name);

let li = document.createElement("li");
li.innerText = name;

document.getElementById("list").appendChild(li);
}

function pickWinner(){
let random = Math.floor(Math.random()*names.length);
document.getElementById("winner").innerText =
"🏆 Winner: " + names[random];
}
</script>

</body>
</html>
