<!DOCTYPE html>
<html>
<head>
<title>Lucky Draw</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  margin:0;
}

/* MENU */
.topbar{
  background:#020617;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu{
  display:none;
  background:#1e293b;
  padding:15px;
  text-align:left;
}

.box{
  background:#1e293b;
  padding:20px;
  margin:15px;
  border-radius:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

.add{background:green;color:white;}
.pay{background:orange;}
.win{background:#22c55e;}

#qr{display:none;}
</style>
</head>

<body>

<!-- 🔥 TOP MENU -->
<div class="topbar">
  <h3>🎉 Lucky Draw</h3>
  <button onclick="toggleMenu()">☰ Menu</button>
</div>

<!-- 🔥 MENU -->
<div id="menuBox" class="menu">
  <p><b>💰 Entry Fee:</b> ₹50 Only</p>
  <p><b>🏆 Winning Prize:</b> ₹5,00,000 तक</p>
  <hr>
  <p><b>📞 Contact:</b> 6391609712</p>
  <p><b>📧 Email:</b> support@luckydraw.com</p>
  <hr>
  <p style="font-size:12px;color:#94a3b8;">
    ⚠️ Lucky draw result random system se nikala jata hai.
  </p>
</div>

<h2>🎉 Lucky Draw Contest</h2>

<!-- 👤 USER SECTION -->
<div class="box">
<input id="name" placeholder="Enter name">
<button class="add" onclick="addName()">Add</button>
<ul id="list"></ul>
</div>

<!-- 💰 PAYMENT -->
<div class="box">
<h3>💰 Pay ₹50 Entry Fee</h3>

<a href="upi://pay?pa=6391609712-2@ibl&pn=AmanGupta&am=50&cu=INR">
<button class="pay" onclick="markPaid()">Pay Now</button>
</a>

<br>

<button onclick="showQR()">Show QR Code</button>

<br><br>

<img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=6391609712-2@ibl&pn=AmanGupta&am=50&cu=INR">

<p id="status">❌ Payment Required</p>
</div>

<!-- 🎯 WINNER -->
<div class="box">
<button class="win" onclick="pickWinner()">🎯 Pick Winner</button>
<h3 id="winner"></h3>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let paid = localStorage.getItem("paid") || "no";

/* MENU */
function toggleMenu(){
  let menu = document.getElementById("menuBox");
  menu.style.display = (menu.style.display==="block")?"none":"block";
}

/* LOAD */
function load(){
document.getElementById("list").innerHTML="";

users.forEach(u=>{
let li=document.createElement("li");
li.innerText=u.name+" (Ticket: "+u.ticket+")";
document.getElementById("list").appendChild(li);
});

if(paid==="yes"){
document.getElementById("status").innerText="✅ Payment Done";
}
}

load();

/* QR */
function showQR(){
document.getElementById("qr").style.display="block";
}

/* PAYMENT MARK */
function markPaid(){
paid="yes";
localStorage.setItem("paid","yes");
load();
}

/* ADD NAME */
function addName(){

if(paid!=="yes"){
alert("⚠️ पहले payment करो");
return;
}

let name=document.getElementById("name").value;

if(name===""){
alert("Enter name");
return;
}

let ticket="LD-"+Math.floor(Math.random()*10000);

users.push({name,ticket});
localStorage.setItem("users",JSON.stringify(users));

load();

document.getElementById("name").value="";
}

/* WINNER */
function pickWinner(){

if(users.length===0){
alert("No users");
return;
}

let winner=users[Math.floor(Math.random()*users.length)];

document.getElementById("winner").innerText=
"🏆 Winner: "+winner.name+" ("+winner.ticket+")";
}

</script>

</body>
</html>
