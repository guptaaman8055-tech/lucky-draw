<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultra Lucky Draw</title>

<style>
body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

.box{
background:#0f172a;
padding:15px;
margin:10px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.num{
display:inline-block;
padding:12px;
margin:4px;
background:#1e293b;
border-radius:6px;
cursor:pointer;
}

.active{background:#22c55e;}
.light{background:yellow;color:black;box-shadow:0 0 15px yellow;}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
75%{transform:translate(5px)}
100%{transform:translate(0)}
}
.shake{animation:shake 0.5s;}

#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.flash{
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:#22c55e;}
50%{color:#facc15;}
100%{color:#22c55e;}
}
</style>
</head>

<body>

<h2>🎉 Ultra Lucky Draw</h2>

<div class="box">
💰 Prize ₹50000 <br>
🎟 Entry ₹50 <br>
🆔 Draw ID: ULTRA-001
</div>

<!-- LOGIN -->
<div class="box">
<h3>🔐 Login</h3>
<input id="uid" placeholder="User ID"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- PAYMENT -->
<div class="box">
<h3>💳 Payment</h3>

<!-- ✅ FIXED QR CODE (तुम्हारा वाला) -->
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q345233165@ybl&pn=Payment&am=50" width="200">

<br><br>
<button onclick="pay()">Pay ₹50</button>
<p id="payStatus">Status: Pending</p>
</div>

<!-- NUMBERS -->
<div class="box">
<h3>🎯 Select Number (0–15)</h3>
<div id="nums"></div>
</div>

<!-- TIMER -->
<div class="box">
<h2 id="timer">Press Start</h2>
<button onclick="start()">Start Draw</button>
</div>

<!-- RESULT -->
<div class="box">
<h2 id="result">Result Locked</h2>
</div>

<!-- POPUP -->
<div id="popup">
<h1 id="winText"></h1>
</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="thunder" src="https://actions.google.com/sounds/v1/weather/thunder_crack.ogg"></audio>
<audio id="win" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

let logged=false;
let selected=null;

const prize={
0:0,1:2000,2:3000,3:2500,4:4000,
5:1500,6:3500,7:5000,8:4500,
9:3000,10:6000,11:2000,
12:3500,13:2500,14:4000,15:5000
};

/* CREATE NUMBERS */
let box=document.getElementById("nums");
for(let i=0;i<=15;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="num";

d.onclick=()=>{
if(!logged){alert("Login First"); return;}

document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
selected=i;
};

box.appendChild(d);
}

/* LOGIN */
function login(){
let u=document.getElementById("uid").value;
let p=document.getElementById("pass").value;

if(u && p){
logged=true;
alert("Login Success ✅");
}else{
alert("Fill all fields ❌");
}
}

/* PAYMENT */
function pay(){
document.getElementById("payStatus").innerText="Status: Paid ✅";
}

/* START TIMER */
function start(){

if(!logged){alert("Login First"); return;}
if(selected===null){alert("Select Number"); return;}

let count=10;

let interval=setInterval(()=>{
document.getElementById("timer").innerText="⏳ "+count;
document.getElementById("tick").play();

count--;

if(count<0){
clearInterval(interval);
lightning();
}

},1000);
}

/* LIGHTNING EFFECT */
function lightning(){

document.body.classList.add("shake");
document.getElementById("thunder").play();

let nums=document.querySelectorAll(".num");
let i=0;
let finalNum=Math.floor(Math.random()*16);

let run=setInterval(()=>{
nums.forEach(n=>n.classList.remove("light"));

let rand=Math.floor(Math.random()*16);
nums[rand].classList.add("light");

i++;

if(i>20){
clearInterval(run);
nums.forEach(n=>n.classList.remove("light"));
nums[finalNum].classList.add("light");
show(finalNum);
}

},100);
}

/* RESULT */
function show(n){

let amt=prize[n];

document.getElementById("result").innerText=
"🎯 Number: "+n+" | 💰 ₹"+amt;

document.getElementById("win").play();

let popup=document.getElementById("popup");
let txt=document.getElementById("winText");

txt.innerText="💥 BIG WIN ₹"+amt;
txt.className="flash";

popup.style.display="flex";

setTimeout(()=>popup.style.display="none",3000);
}

</script>

</body>
</html>
