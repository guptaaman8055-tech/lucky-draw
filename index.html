<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Ultra Max</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}

#wheel{
width:260px;height:260px;border-radius:50%;
border:8px solid white;margin:20px auto;
position:relative;
display:flex;align-items:center;justify-content:center;
transition:transform 4s ease-out;
}

.slice{
position:absolute;
width:100%;height:100%;
border-radius:50%;
clip-path: polygon(50% 50%, 100% 0, 100% 100%);
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:10px;
font-size:10px;
font-weight:bold;
}

.centerText{
position:absolute;
font-size:20px;
font-weight:bold;
}

.fire{font-size:30px;display:none;}
</style>
</head>

<body>

<h2>🎉 Lucky Draw Ultra Max</h2>

<div class="box">
<h3>💰 Entry ₹50 | 🏆 Total Prize ₹50000</h3>
</div>

<div class="box">
<h2 id="timer"></h2>
</div>

<!-- SUPPORT -->
<div class="box">
<h3>💬 Support</h3>
<p>📧 support@luckydraw.com</p>
<a href="https://t.me/tiger7652" target="_blank">
<button style="background:#229ED9;color:white;">📲 Telegram</button>
</a>
</div>

<div class="box">
<div id="wheel">
<div class="centerText">SPIN</div>
</div>
<button onclick="spin()">Spin</button>
</div>

<div class="box">
<h2 id="winner">Result Locked</h2>
<div class="fire" id="fire">🎆🎆🎆 WINNER 🎆🎆🎆</div>
</div>

<div class="box">
<h3>📊 Results</h3>
<ul id="results"></ul>
</div>

<script>

let drawOpen=false;
let winningNumber=null;

/* Prize Map */
const prizeMap = {
1:2000,2:3000,3:2500,4:4000,5:1500,
6:3500,7:5000,8:4500,9:3000,10:6000,
11:2000,12:3500,13:2500,14:4000,15:5000
};

/* Create Wheel */
let wheel=document.getElementById("wheel");
for(let i=1;i<=15;i++){
 let div=document.createElement("div");
 div.className="slice";
 div.style.transform="rotate("+(i*24)+"deg)";
 div.style.background="hsl("+(i*24)+",70%,60%)";
 div.innerHTML="₹"+prizeMap[i];
 wheel.appendChild(div);
}

/* Timer */
let end=new Date().getTime()+20000;

setInterval(()=>{
 let d=end-new Date().getTime();
 let s=Math.floor(d/1000);

 document.getElementById("timer").innerText=s+" sec";

 if(d<=0){
  drawOpen=true;
  document.getElementById("timer").innerText="DRAW OPEN";
 }
},1000);

/* Spin */
function spin(){
 if(!drawOpen) return alert("Wait for timer");

 let num=Math.floor(Math.random()*15)+1;
 let deg=3600+(num*24);

 wheel.style.transform="rotate("+deg+"deg)";

 setTimeout(()=>showWinner(num),4000);
}

/* Winner - ONLY AMOUNT */
function showWinner(num){

 let amount=prizeMap[num];

 let res="🏆 Winning Amount: ₹"+amount;

 document.getElementById("winner").innerText=res;
 document.getElementById("fire").style.display="block";

 let li=document.createElement("li");
 li.innerText=res;

 document.getElementById("results").appendChild(li);
}

</script>

</body>
</html>
