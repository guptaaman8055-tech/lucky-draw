<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Pro</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}
#wheel{
width:200px;height:200px;border-radius:50%;
border:8px solid white;margin:20px auto;
display:flex;align-items:center;justify-content:center;
transition:transform 3s;
}
</style>
</head>

<body>

<h2>🎉 Lucky Draw Dashboard</h2>

<!-- INFO -->
<div class="box">
<h3>💰 Entry ₹50 | 🏆 Win up to ₹50000</h3>
</div>

<!-- TIMER -->
<div class="box">
<h3>⏳ Countdown Timer</h3>
<h2 id="timer"></h2>
</div>

<!-- PAYMENT -->
<div class="box">
<h3>💳 Payment Panel</h3>
<button onclick="pay()">Pay ₹50</button>
<p id="payStatus">❌ Not Paid</p>
</div>

<!-- USER -->
<div class="box">
<input id="name" placeholder="Enter Name">
</div>

<!-- NUMBERS -->
<div class="box">
<h3>Select Number</h3>
<div id="numbers"></div>
<p id="chosen"></p>
</div>

<!-- ENTRY -->
<div class="box">
<button onclick="request()">Submit Entry</button>
</div>

<!-- ADMIN -->
<div class="box">
<h3>🔐 Admin Panel</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<ul id="reqList"></ul>
</div>
</div>

<!-- SPIN -->
<div class="box">
<h3>🎡 Spin</h3>
<div id="wheel">SPIN</div>
<button onclick="spin()">Spin</button>
</div>

<!-- DRAW -->
<div class="box">
<button onclick="draw()">🎯 Draw Winner</button>
<h2 id="winner">Result Locked</h2>
</div>

<!-- RESULTS -->
<div class="box">
<h3>📊 Results</h3>
<ul id="results"></ul>
</div>

<!-- SUPPORT -->
<div class="box">
<h3>💬 Customer Support</h3>
<p>Email: support@luckydraw.com</p>
</div>

<script>

let selected=null;
let paid=false;
let users=JSON.parse(localStorage.getItem("users"))||[];
let requests=[];
let drawOpen=false;

/* Numbers */
let div=document.getElementById("numbers");
for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText=i;
 btn.className="num";

 if(users.find(u=>u.number===i)) btn.classList.add("taken");

 btn.onclick=()=>{
  if(selected) return alert("Only 1 number allowed");
  if(users.find(u=>u.number===i)) return alert("Already taken");

  selected=i;
  btn.classList.add("selected");
  document.getElementById("chosen").innerText="Selected: "+i;
 };

 div.appendChild(btn);
}

/* Payment (demo) */
function pay(){
 paid=true;
 document.getElementById("payStatus").innerText="✅ Paid";
}

/* Entry */
function request(){
 let name=document.getElementById("name").value;
 if(!paid) return alert("Payment karo");
 if(!name||!selected) return alert("Fill all");

 requests.push({name,number:selected});
 alert("Request sent");
}

/* Admin */
function login(){
 if(document.getElementById("pass").value==="1234"){
  document.getElementById("admin").style.display="block";
  loadReq();
 }
}

/* Approve */
function loadReq(){
 let list=document.getElementById("reqList");
 list.innerHTML="";

 requests.forEach((r,i)=>{
  let li=document.createElement("li");
  li.innerText=r.name+" ("+r.number+")";

  let btn=document.createElement("button");
  btn.innerText="Approve";

  btn.onclick=()=>{
   users.push(r);
   localStorage.setItem("users",JSON.stringify(users));
   requests.splice(i,1);
   location.reload();
  };

  li.appendChild(btn);
  list.appendChild(li);
 });
}

/* Spin */
function spin(){
 let w=document.getElementById("wheel");
 let deg=3600+Math.random()*1000;
 w.style.transform="rotate("+deg+"deg)";
}

/* Draw */
function draw(){
 if(!drawOpen) return alert("Timer not finished");

 let num=Math.floor(Math.random()*15)+1;
 let win=users.find(u=>u.number===num);

 let res;
 if(win){
  res="🏆 "+win.name+" (No: "+num+")";
 } else {
  res="No Winner (No: "+num+")";
 }

 document.getElementById("winner").innerText=res;

 let li=document.createElement("li");
 li.innerText=res;
 document.getElementById("results").appendChild(li);
}

/* Timer */
let end=new Date().getTime()+300000;

setInterval(()=>{
 let now=new Date().getTime();
 let d=end-now;

 let m=Math.floor(d/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("timer").innerText=m+"m "+s+"s";

 if(d<=0){
  drawOpen=true;
  document.getElementById("timer").innerText="DRAW OPEN";
 }
},1000);

</script>

</body>
</html>
