<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Numbers</title>

<style>
body {font-family:Arial; background:#0f172a; color:white; text-align:center;}
.box {background:#1e293b; padding:15px; margin:15px; border-radius:10px;}
button {padding:10px; margin:5px; border:none; border-radius:6px; cursor:pointer;}
.num {background:#334155; color:white;}
.selected {background:#22c55e;}
#wheel {
  width:200px; height:200px; border-radius:50%;
  border:8px solid white; margin:20px auto;
  display:flex; align-items:center; justify-content:center;
  transition: transform 3s ease-out;
}
</style>
</head>

<body>

<h2>🎉 Lucky Draw (1–15)</h2>

<!-- NUMBER SELECT -->
<div class="box">
<h3>🔢 Choose Your Number</h3>
<div id="numbers"></div>
<p id="chosen">No number selected</p>
</div>

<!-- USER -->
<div class="box">
<input id="name" placeholder="Enter name">
<button onclick="saveEntry()">Confirm Entry</button>
<ul id="list"></ul>
</div>

<!-- WHEEL -->
<div class="box">
<h3>🎡 Spin</h3>
<div id="wheel">SPIN</div>
<button onclick="spin()">Spin</button>
</div>

<!-- DRAW -->
<div class="box">
<button onclick="draw()">🎯 Draw Winner</button>
<h2 id="winner">No Winner</h2>
</div>

<script>

let selectedNumber = null;
let users = [];

/* Create numbers 1–15 */
let numDiv = document.getElementById("numbers");
for(let i=1;i<=15;i++){
  let btn=document.createElement("button");
  btn.innerText=i;
  btn.className="num";
  btn.onclick=()=>selectNumber(i,btn);
  numDiv.appendChild(btn);
}

function selectNumber(num,btn){
  if(selectedNumber!==null){
    alert("Sirf 1 number choose kar sakte ho");
    return;
  }
  selectedNumber=num;
  btn.classList.add("selected");
  document.getElementById("chosen").innerText="Selected: "+num;
}

/* Save Entry */
function saveEntry(){
  let name=document.getElementById("name").value;
  if(!name || selectedNumber===null){
    alert("Name aur number select karo");
    return;
  }

  users.push({name,number:selectedNumber});

  let li=document.createElement("li");
  li.innerText=name+" (No: "+selectedNumber+")";
  document.getElementById("list").appendChild(li);

  document.getElementById("name").value="";
}

/* Spin */
function spin(){
  let w=document.getElementById("wheel");
  let deg=3600+Math.random()*1000;
  w.style.transform="rotate("+deg+"deg)";
}

/* Draw */
function draw(){
  let winNumber = Math.floor(Math.random()*15)+1;

  let winners = users.filter(u=>u.number===winNumber);

  if(winners.length>0){
    document.getElementById("winner").innerText =
      "🏆 Winning Number: "+winNumber+" | Winner: "+winners[0].name;
  } else {
    document.getElementById("winner").innerText =
      "Winning Number: "+winNumber+" | No Winner";
  }
}

</script>

</body>
</html>
