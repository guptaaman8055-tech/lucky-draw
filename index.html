<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lucky Spin Game</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,sans-serif;
background:#080d19;
color:white;
}
.app{
max-width:450px;
margin:auto;
padding:15px;
}
.header{
background:linear-gradient(135deg,#202a44,#111827);
padding:18px;
border-radius:18px;
text-align:center;
}
.header h1{
margin:0;
color:#ffd700;
}
.wallet{
margin-top:15px;
background:#162033;
padding:15px;
border-radius:15px;
text-align:center;
}
.coins{
font-size:30px;
color:#22c55e;
font-weight:bold;
}
.card{
background:#162033;
padding:18px;
border-radius:15px;
margin-top:15px;
text-align:center;
}
.wheel{
width:230px;
height:230px;
margin:20px auto;
border-radius:50%;
border:8px solid #ffd700;
background:conic-gradient(
#ef4444 0deg 60deg,
#22c55e 60deg 120deg,
#3b82f6 120deg 180deg,
#eab308 180deg 240deg,
#a855f7 240deg 300deg,
#f97316 300deg 360deg
);
display:flex;
align-items:center;
justify-content:center;
transition:transform 4s cubic-bezier(.17,.67,.12,.99);
box-shadow:0 0 30px rgba(255,215,0,.4);
}
.wheel span{
background:#111827;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:#ffd700;
}
.pointer{
font-size:30px;
color:#ffd700;
}
button{
width:100%;
padding:13px;
margin-top:10px;
border:0;
border-radius:10px;
background:#ffd700;
color:#111;
font-weight:bold;
font-size:16px;
cursor:pointer;
}
button:disabled{
opacity:.5;
}
.result{
font-size:20px;
color:#22c55e;
margin-top:12px;
min-height:25px;
}
.row{
display:flex;
justify-content:space-between;
padding:12px;
background:#263449;
margin:7px 0;
border-radius:9px;
}
.history{
text-align:left;
color:#bbb;
font-size:14px;
line-height:1.8;
}
input{
width:100%;
padding:12px;
border:0;
border-radius:9px;
background:#263449;
color:white;
margin-top:8px;
}
.small{
font-size:12px;
color:#999;
margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>🎮 LUCKY SPIN</h1>
<p>Entertainment Demo Game</p>
</div>

<div class="wallet">
<div>🪙 Demo Coins</div>
<div class="coins" id="coins">1000</div>
</div>

<div class="card">

<div class="pointer">▼</div>

<div class="wheel" id="wheel">
<span>SPIN</span>
</div>

<button id="spinBtn" onclick="spin()">
🎡 SPIN WHEEL
</button>

<div class="result" id="result">
Ready to Play
</div>

<p class="small">
Demo Coins have no real monetary value.
</p>

</div>

<div class="card">

<h2>🎁 Daily Bonus</h2>

<button onclick="dailyBonus()">
Claim +100 Demo Coins
</button>

</div>

<div class="card">

<h2>👑 VIP LEVEL</h2>

<div class="row">
<span>Current Level</span>
<b id="vip">VIP 1</b>
</div>

<div class="row">
<span>Total Coins</span>
<b id="total">1000</b>
</div>

</div>

<div class="card">

<h2>👤 Profile</h2>

<input id="name" placeholder="Enter Your Name">

<input id="ref" placeholder="Referral Code">

<button onclick="saveProfile()">
Save Profile
</button>

<p id="welcome"></p>

</div>

<div class="card">

<h2>📜 History</h2>

<div id="history" class="history">
No activity yet.
</div>

</div>

</div>

<script>

let coins =
Number(localStorage.getItem("coins")) || 1000;

let history =
JSON.parse(localStorage.getItem("history")) || [];

let rotation = 0;

function update(){

document.getElementById("coins")
.innerText = coins;

document.getElementById("total")
.innerText = coins;

let level =
Math.floor(coins/1000)+1;

document.getElementById("vip")
.innerText =
"VIP "+level;

if(history.length){

document.getElementById("history")
.innerHTML =
history.join("<br>");

}

localStorage.setItem(
"coins",
coins
);

localStorage.setItem(
"history",
JSON.stringify(history)
);

}

function spin(){

let btn =
document.getElementById("spinBtn");

btn.disabled=true;

let reward =
Math.floor(Math.random()*201);

let number =
Math.floor(Math.random()*20)+1;

rotation +=
1440 +
Math.floor(Math.random()*360);

document.getElementById("wheel")
.style.transform =
"rotate("+rotation+"deg)";

setTimeout(()=>{

coins += reward;

document.getElementById("result")
.innerText =
"🎉 Number "+number+
" | +"+reward+
" Demo Coins";

history.unshift(
"🎡 Spin: Number "+
number+
" → +"+
reward+
" Coins"
);

if(history.length>10)
history.pop();

update();

btn.disabled=false;

},4000);

}

function dailyBonus(){

let today =
new Date().toDateString();

if(localStorage.getItem("bonus")
===today){

alert(
"Today's bonus already claimed!"
);

return;

}

coins +=100;

localStorage.setItem(
"bonus",
today
);

history.unshift(
"🎁 Daily Bonus +100 Coins"
);

update();

alert(
"100 Demo Coins Added!"
);

}

function saveProfile(){

let name =
document.getElementById("name")
.value;

let ref =
document.getElementById("ref")
.value;

if(!name){

alert(
"Please enter your name"
);

return;

}

localStorage.setItem(
"name",
name
);

localStorage.setItem(
"ref",
ref
);

document.getElementById("welcome")
.innerText =
"Welcome "+name+" 👋";

}

function loadProfile(){

let name =
localStorage.getItem("name");

let ref =
localStorage.getItem("ref");

if(name){

document.getElementById("name")
.value=name;

document.getElementById("ref")
.value=ref||"";

document.getElementById("welcome")
.innerText =
"Welcome "+name+" 👋";

}

}

update();
loadProfile();

</script>

</body>
</html>
