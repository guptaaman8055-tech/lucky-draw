<script>

let logged=false;
let selected=null;
let timerRunning=false;

/* PRIZE */
const prize={
0:0,1:2000,2:3000,3:2500,4:4000,
5:1500,6:3500,7:5000,8:4500,
9:3000,10:6000,11:2000,
12:3500,13:2500,14:4000,15:5000
};

/* CREATE NUMBERS */
let box=document.getElementById("nums");
for(let i=0;i<=15;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="num";

d.onclick=()=>{
if(!logged) return alert("Login First");

document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
selected=i;
};

box.appendChild(d);
}

/* LOGIN */
function login(){
if(uid.value && mobile.value && pass.value){
logged=true;
loginStatus.innerText="✅ Login Success";
}else{
alert("Fill all");
}
}

/* PAYMENT */
function pay(){
alert("Pay ₹50 and upload screenshot");
}

function upload(){
payStatus.innerText="Status: Paid ✅";
}

/* ✅ FIXED TIMER */
function start(){

if(timerRunning) return; // duplicate run रोकने के लिए
if(!logged) return alert("Login First");
if(selected===null) return alert("Select Number");

timerRunning=true;

let count=10;
let timerEl=document.getElementById("timer");

timerEl.innerText="⏳ "+count;

let t=setInterval(()=>{

document.getElementById("tick").currentTime=0;
document.getElementById("tick").play();

count--;
timerEl.innerText="⏳ "+count;

if(count<=0){
clearInterval(t);
timerEl.innerText="⚡ Starting...";
setTimeout(()=>{
lightning();
timerRunning=false;
},500);
}

},1000);
}

/* LIGHTNING EFFECT */
function lightning(){

document.body.classList.add("shake");
document.getElementById("thunder").play();

let nums=document.querySelectorAll(".num");
let i=0;
let winNum=0;

let run=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

winNum=Math.floor(Math.random()*16);
nums[winNum].classList.add("light");

i++;

if(i>25){
clearInterval(run);
document.body.classList.remove("shake");
show(winNum);
}

},100);
}

/* RESULT */
function show(n){

let amt=prize[n];

result.innerText="🎯 Number: "+n+" | 💰 ₹"+amt;

/* Ticket ID */
let ticketId="TKT"+Math.floor(Math.random()*999999);
ticket.innerText="🎫 Ticket ID: "+ticketId;

document.getElementById("win").play();

/* POPUP */
popup.style.display="flex";
winText.innerText="💥 BIG WIN ₹"+amt;

setTimeout(()=>popup.style.display="none",3000);
}

/* WITHDRAW */
function withdraw(){
alert("Withdrawal Requested");
}

</script>
