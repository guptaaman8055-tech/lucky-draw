<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lightning Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:#fff;
text-align:center;
}

/* HEADER */
.top{
display:flex;
justify-content:space-between;
padding:10px;
}

.deposit{
background:#22c55e;
padding:8px 15px;
border-radius:10px;
}

/* TIMER */
.timerBox{
position:fixed;
top:60px;
right:10px;
background:#111;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 0 15px gold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
padding:15px;
}

.num{
padding:20px;
background:#111;
border:1px solid gold;
border-radius:6px;
font-size:18px;
}

.active{
background:gold;
color:black;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:#000;
padding:10px;
}

.chip{
display:inline-block;
padding:8px 12px;
border-radius:50%;
background:#222;
margin:5px;
}

/* RESULT FLASH */
.win{
animation:flash 1s infinite;
}

@keyframes flash{
0%{background:gold;}
50%{background:red;}
100%{background:gold;}
}

</style>
</head>

<body>

<div class="top">
<div>💰 Balance ₹0</div>
<div class="deposit">Deposit</div>
</div>

<h3>⚡ PLACE YOUR BETS</h3>

<div class="timerBox" id="timer">10</div>

<div class="grid" id="grid"></div>

<div class="bottom">
<span class="chip">10</span>
<span class="chip">50</span>
<span class="chip">100</span>
<span class="chip">500</span>
</div>

<script>

/* CREATE NUMBERS */
let grid=document.getElementById("grid");

for(let i=1;i<=20;i++){
let d=document.createElement("div");
d.className="num";
d.innerText=i;
grid.appendChild(d);
}

/* TIMER LOOP SYSTEM */
let time=10;

function startRound(){

let t=setInterval(()=>{

document.getElementById("timer").innerText=time;

time--;

if(time<0){
clearInterval(t);
runResult();
}

},1000);

}

/* RESULT ANIMATION */
function runResult(){

let nums=document.querySelectorAll(".num");

let i=0;

let run=setInterval(()=>{

nums.forEach(n=>n.classList.remove("active"));

let r=Math.floor(Math.random()*20);

nums[r].classList.add("active");

i++;

if(i>20){
clearInterval(run);

nums[r].classList.add("win");

setTimeout(()=>{
nums[r].classList.remove("win");
nextRound();
},2000);

}

},100);

}

/* NEXT ROUND */
function nextRound(){
time=10;
startRound();
}

/* START */
startRound();

</script>

</body>
</html>
