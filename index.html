<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casino 3D Wheel</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h2{
text-shadow:0 0 20px gold;
}

#canvas{
width:100%;
height:65vh;
}

/* BUTTON */
button{
padding:15px 30px;
background:gold;
border:none;
border-radius:10px;
font-size:18px;
box-shadow:0 0 20px gold;
}

/* POINTER */
#pointer{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}

/* RESULT */
#result{
margin-top:10px;
font-size:22px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.bigwin{
font-size:45px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}

/* SHAKE */
.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
75%{transform:translate(5px)}
100%{transform:translate(0)}
}

</style>
</head>

<body>

<h2>🎰 CASINO 3D WHEEL (DEMO)</h2>

<div id="pointer">▼</div>

<canvas id="canvas"></canvas>

<button onclick="spin()">SPIN</button>

<div id="result">Waiting...</div>

<div id="popup">
<div class="bigwin" id="winText"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* THREE JS */
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({canvas:document.getElementById("canvas"),alpha:true});

renderer.setSize(window.innerWidth,window.innerHeight*0.65);

camera.position.z=6;

/* LIGHTS */
let light=new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

/* WHEEL */
let geometry=new THREE.CylinderGeometry(3,3,0.5,32);
let material=new THREE.MeshStandardMaterial({
color:0x222222,
metalness:0.8,
roughness:0.2
});

let wheel=new THREE.Mesh(geometry,material);
scene.add(wheel);

/* COLORS */
let colors=[0xff0000,0x00ff00,0xffff00,0x00ffff,0xff00ff];

/* SEGMENTS VISUAL */
for(let i=0;i<15;i++){
let geo=new THREE.BoxGeometry(0.3,0.5,3);
let mat=new THREE.MeshBasicMaterial({color:colors[i%5]});

let part=new THREE.Mesh(geo,mat);

part.position.set(Math.sin(i*0.4)*3,0,Math.cos(i*0.4)*3);
part.rotation.y=i*0.4;

wheel.add(part);
}

/* ANIMATE */
function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

/* SPIN */
function spin(){

document.body.classList.add("shake");

let speed=0.3;
let total=0;

let target=Math.floor(Math.random()*15);

let spinAnim=setInterval(()=>{

wheel.rotation.y+=speed;
total+=speed;
speed*=0.98;

if(speed<0.01){
clearInterval(spinAnim);
showResult(target);
}

},30);
}

/* RESULT */
function showResult(num){

document.body.classList.remove("shake");

document.getElementById("result").innerText="🎯 Number: "+num;

let popup=document.getElementById("popup");
let text=document.getElementById("winText");

text.innerText="💥 BIG WIN: "+num;

popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
},3000);
}

</script>

</body>
</html>
