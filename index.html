<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw Ultra Max</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}

#wheel{
width:260px;height:260px;border-radius:50%;
border:8px solid white;margin:20px auto;
position:relative;
display:flex;align-items:center;justify-content:center;
transition:transform 4s ease-out;
}

.slice{
position:absolute;
width:100%;height:100%;
border-radius:50%;
clip-path: polygon(50% 50%, 100% 0, 100% 100%);
display:flex;
align-items:center;
justify-content:flex-end;
padding-right:10px;
font-size:10px;
font-weight:bold;
}

.centerText{
position:absolute;
font-size:18px;
font-weight:bold;
}

.fire{font-size:30px;display:none;}
</style>
</head>

<body>

<h2>🎉 Lucky Draw Ultra Max</h2>

<div class="box">
<h3>💰 Entry ₹50 | 🏆 Total Prize ₹50000</h3>
<p>👥 Participants: <span id="count">0</span></p>
</div>

<div class="box">
<h2 id="timer"></h2>
</div>

<div class="box">
<h3>💳 Payment</h3>
<img src="GooglePay_QR.png" width="200">
<p>UPI: guptaaman8055-3@okaxis</p>

<input type="file" id="proof">
<button onclick="upload()">Upload Screenshot</button>
<p id="payStatus">❌ Not Paid</p>
</div>

<div class="box">
<input id="name" placeholder="Enter Name">
</div>

<div class="box">
<h3>Select Number</h3>
<div id="numbers"></div>
<p id="chosen"></p>
</div>

<div class="box">
<button onclick="request()">Submit Entry</button>
</div>

<div class="box">
<h3>🔐 Admin</h3>
<input type="password" id="pass">
<button onclick="login()">Login</button>
<div id="admin" style="display:none;">
<ul id="reqList"></ul>
</div>
</div>

<div class="box">
<div id="wheel">
<div class="centerText">SPIN</div>
</div>
<button onclick="spin()">Spin</button>
</div>

<div class="box">
<h2 id="winner">Result Locked</h2>
<div class="fire" id="fire">🎆🎆🎆 WINNER 🎆🎆🎆</div>
</div>

<div class="box">
<h3>📊 Results</h3>
<ul id="results"></ul>
</div>

<!-- SUPPORT -->
<div class="box">
<h3>💬 Support</h3>
<p>📧 support@luckydraw.com</p>
<a href="https://t.me/tiger7652" target="_blank">
<button style="background:#229ED9;color:white;">Telegram</button>
</a>
</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

let selected=null;
let paid=false;
let users=JSON.parse(localStorage.getItem("users"))||[];
let requests=[];
let drawOpen=false;
let winningNumber=null;

/* 🎯 Prize */
const prizeMap={
1:2000,2:3000,3:2500,4:4000,5:1500,
6:3500,7:5000,8:4500,9:3000,10:6000,
11:2000,12:3500,13:2500,14:4000,15:5000
};

/* 🎯 Names */
const defaultNames=[
"Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Mohit","Rahul",
"Karan","Aman","Yash","Nikhil","Saurabh","Ankit","Deepak",
"Sumit","Varun","Ravi","Akash","Manish","Raj","Vijay","Shubham",
"Abhishek","Neeraj","Tarun","Harsh","Gaurav","Siddharth","Dev",
"Krish","Ishaan","Lakshya","Pranav","Tushar","Ritesh","Pankaj",
"Dinesh","Suraj","Ajay"
];

/* Auto Load Names */
if(users.length===0){
 defaultNames.forEach(n=>{
  users.push({name:n,number:Math.floor(Math.random()*15)+1});
 });
 localStorage.setItem("users",JSON.stringify(users));
}

/* Wheel */
let wheel=document.getElementById("wheel");
for(let i=1;i<=15;i++){
 let div=document.createElement("div");
 div.className="slice";
 div.style.transform="rotate("+(i*24)+"deg)";
 div.style.background="hsl("+(i*24)+",70%,60%)";
 div.innerHTML="₹"+prizeMap[i]+"<br>#"+i;
 wheel.appendChild(div);
}

/* Numbers */
let numDiv=document.getElementById("numbers");
for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText=i;
 btn.className="num";
 btn.onclick=()=>{
  if(selected) return alert("Only 1 allowed");
  selected=i;
  btn.classList.add("selected");
  document.getElementById("chosen").innerText="Selected: "+i;
 };
 numDiv.appendChild(btn);
}

/* Payment */
function upload(){
 let file=document.getElementById("proof").files[0];
 if(!file) return alert("Upload screenshot");
 paid=true;
 document.getElementById("payStatus").innerText="✅ Done";
}

/* Entry */
function request(){
 let name=document.getElementById("name").value;
 if(!paid) return alert("Payment required");
 if(!name||!selected) return alert("Fill all");
 users.push({name,number:selected});
 localStorage.setItem("users",JSON.stringify(users));
 location.reload();
}

/* Timer */
let end=new Date().getTime()+60000;
setInterval(()=>{
 let s=Math.floor((end-new Date().getTime())/1000);
 document.getElementById("timer").innerText=s+" sec";
 if(s<=5) document.getElementById("tick").play();
 if(s<=0){drawOpen=true;autoDraw();}
},1000);

/* Draw */
function autoDraw(){
 winningNumber=Math.floor(Math.random()*15)+1;
 spin();
}

/* Spin */
function spin(){
 if(!drawOpen) return alert("Wait");
 document.getElementById("spinSound").play();
 let deg=3600+(winningNumber*24);
 wheel.style.transform="rotate("+deg+"deg)";
 setTimeout(()=>showWinner(winningNumber),4000);
}

/* Winner */
function showWinner(num){
 let amount=prizeMap[num];
 let win=users[Math.floor(Math.random()*users.length)];
 let res="🏆 "+win.name+" WON ₹"+amount+" | No:"+num;

 document.getElementById("winner").innerText=res;
 document.getElementById("fire").style.display="block";
 document.getElementById("winSound").play();

 let li=document.createElement("li");
 li.innerText=res;
 document.getElementById("results").appendChild(li);

 localStorage.setItem("results",document.getElementById("results").innerHTML);
}

/* Load */
window.onload=()=>{
 let saved=localStorage.getItem("results");
 if(saved) document.getElementById("results").innerHTML=saved;
 document.getElementById("count").innerText=users.length;
};

</script>

</body>
</html>
