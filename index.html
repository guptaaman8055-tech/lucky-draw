<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIP Lightning PRO</title>

<style>
body{
margin:0;
background:#0b0f1a;
font-family:sans-serif;
color:#fff;
text-align:center;
}

/* TOP */
.top{
display:flex;
justify-content:space-between;
padding:10px;
}
.balance{color:#22c55e;}

/* TIMER */
.timer{
width:70px;height:70px;
border-radius:50%;
border:6px solid #333;
border-top:6px solid gold;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
padding:10px;
}
.num{
padding:14px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}
.red{background:#b91c1c;}
.black{background:#111;}
.green{background:#15803d;}

.active{outline:2px solid yellow;}
.light{
transform:scale(1.2);
box-shadow:0 0 20px gold;
}

/* COLOR BET */
.colors{
margin:10px;
}
.colorBtn{
padding:8px 12px;
margin:5px;
border-radius:6px;
display:inline-block;
cursor:pointer;
}
.cRed{background:#b91c1c;}
.cBlack{background:#111;}
.cGreen{background:#15803d;}

/* RESULT */
#result{font-size:20px;margin:10px;}
#history{color:#aaa;font-size:14px;}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}
.win{
font-size:30px;
animation:flash 1s infinite;
}
@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}
</style>

</head>
<body>

<div class="top">
<div class="balance" id="bal">💰 ₹1000</div>
</div>

<h3>⚡ VIP PRO GAME</h3>

<div class="timer" id="timer">10</div>

<div class="colors">
<span class="colorBtn cRed" onclick="selectColor('red')">RED</span>
<span class="colorBtn cBlack" onclick="selectColor('black')">BLACK</span>
<span class="colorBtn cGreen" onclick="selectColor('green')">GREEN</span>
</div>

<div class="grid" id="grid"></div>

<div id="result">Select Number or Color</div>
<div id="history">History:</div>

<div id="popup">
<div class="win" id="win"></div>
</div>

<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

/* DATA */
let multipliers=[1,2,5,10,3,2,8,4,6,12,2,3,15,5,20,1,7,9,2,11];

let balance=1000, bet=50;
let selected=null, selectedColor=null;
let locked=false;
let history=[];

/* GRID */
let grid=document.getElementById("grid");

for(let i=1;i<=20;i++){

let d=document.createElement("div");
d.className="num";

let color = i%3==0?"green":i%2==0?"red":"black";
d.classList.add(color);

d.innerHTML=i+"<br>"+multipliers[i-1]+"x";

d.onclick=()=>{
if(locked) return;

selected=i;
selectedColor=null;

document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
};

grid.appendChild(d);
}

/* COLOR SELECT */
function selectColor(c){
if(locked) return;

selectedColor=c;
selected=null;

document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
}

/* TIMER */
let time=10;

function startTimer(){

locked=false;

let t=setInterval(()=>{
timer.innerText=time;
time--;

if(time<0){
clearInterval(t);
run();
}
},1000);
}

/* RUN */
function run(){

locked=true;

document.getElementById("spinSound").play();
if(navigator.vibrate) navigator.vibrate(200);

let nums=document.querySelectorAll(".num");
let i=0, speed=40;

let loop=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

let index=i%20;
nums[index].classList.add("light");

i++;
if(i>40) speed+=5;

if(i>80){
clearInterval(loop);
let winNum=Math.floor(Math.random()*20)+1;
show(winNum);
}
},speed);
}

/* RESULT */
function show(n){

let multi=multipliers[n-1];
let color = n%3==0?"green":n%2==0?"red":"black";

let text="";

/* CHECK */
if(selected===n){
let winAmt=bet*multi;
balance+=winAmt;
text="🎯 NUMBER WIN ₹"+winAmt;

}else if(selectedColor===color){
let winAmt=bet*2;
balance+=winAmt;
text="🎨 COLOR WIN ₹"+winAmt;

}else{
balance-=bet;
text="❌ LOSS ₹"+bet;
}

bal.innerText="💰 ₹"+balance;
result.innerText=text;

/* HISTORY */
history.unshift(n);
if(history.length>6) history.pop();
document.getElementById("history").innerText="History: "+history.join(" | ");

/* SOUND */
document.getElementById("winSound").play();
if(navigator.vibrate) navigator.vibrate(300);

/* POPUP */
let popup=document.getElementById("popup");
let win=document.getElementById("win");

win.innerText=text;
popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
next();
},2000);
}

/* NEXT */
function next(){
time=10;
selected=null;
selectedColor=null;
document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
startTimer();
}

/* START */
startTimer();

</script>
</body>
</html>
