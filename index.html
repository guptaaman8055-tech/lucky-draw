<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Lucky Draw</title>

<style>
body{font-family:Arial;background:#020617;color:white;text-align:center;}

.box{background:#0f172a;padding:15px;margin:10px;border-radius:10px;}

input,button{
padding:10px;margin:5px;border:none;border-radius:6px;
}

button{background:#22c55e;color:white;cursor:pointer;}

.num{
display:inline-block;
padding:10px;margin:3px;
background:#1e293b;border-radius:5px;
}

.active{background:#22c55e;}
.light{background:yellow;color:black;}

#adminPanel{display:none;background:#111827;}
</style>
</head>

<body>

<h2>🎉 Lucky Draw System</h2>

<div class="box">
💰 Prize Pool ₹50000 <br>
🎟 Entry ₹50
</div>

<!-- USER PAYMENT -->
<div class="box">
<h3>💳 Payment</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=Q345233165@ybl&am=50" width="200">

<br>
<input id="utr" placeholder="Enter UTR Number">
<button onclick="submitUTR()">Submit UTR</button>

<p id="payStatus">Status: Not Paid</p>
</div>

<!-- NUMBERS -->
<div class="box">
<h3>🎯 Numbers (0–15)</h3>
<div id="nums"></div>
</div>

<!-- TIMER -->
<div class="box">
<h2 id="timer">Waiting for Admin...</h2>
</div>

<!-- RESULT -->
<div class="box">
<h2 id="result">Result Locked</h2>
</div>

<!-- ADMIN LOGIN -->
<div class="box">
<h3>🔐 Admin Access</h3>
<input id="adminPass" placeholder="Enter Admin Password">
<button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="box">
<h3>⚙ Admin Panel</h3>

<button onclick="startDraw()">▶ Start Draw</button>

<p>Total Users: <span id="users">0</span></p>
<p>Total Collection: ₹<span id="collection">0</span></p>
<p>Winning Amount: ₹<span id="winAmt">0</span></p>
<p>Profit / Loss: ₹<span id="profit">0</span></p>

</div>

<script>

let paidUsers=0;
let collection=0;
let admin=false;

const prize={
0:0,1:2000,2:3000,3:2500,4:4000,
5:1500,6:3500,7:5000,8:4500,
9:3000,10:6000,11:2000,
12:3500,13:2500,14:4000,15:5000
};

/* CREATE NUMBERS */
let box=document.getElementById("nums");
for(let i=0;i<=15;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="num";
box.appendChild(d);
}

/* UTR SUBMIT */
function submitUTR(){
let utr=document.getElementById("utr").value;

if(utr.length<5){
alert("Invalid UTR ❌");
return;
}

paidUsers++;
collection+=50;

document.getElementById("payStatus").innerText="Paid ✅";
updateAdmin();
}

/* ADMIN LOGIN */
function adminLogin(){
let pass=document.getElementById("adminPass").value;

if(pass==="12345"){  // change password
admin=true;
document.getElementById("adminPanel").style.display="block";
alert("Admin Login Success");
}else{
alert("Wrong Password");
}
}

/* START DRAW (ADMIN ONLY) */
function startDraw(){

if(!admin){
alert("Only Admin can start");
return;
}

let count=10;

let t=setInterval(()=>{
document.getElementById("timer").innerText="⏳ "+count;

count--;

if(count<0){
clearInterval(t);
runDraw();
}
},1000);
}

/* DRAW */
function runDraw(){

let nums=document.querySelectorAll(".num");
let i=0;
let finalNum=Math.floor(Math.random()*16);

let run=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

let rand=Math.floor(Math.random()*16);
nums[rand].classList.add("light");

i++;

if(i>20){
clearInterval(run);
nums.forEach(n=>n.classList.remove("light"));
nums[finalNum].classList.add("light");

showResult(finalNum);
}

},100);
}

/* RESULT */
function showResult(n){

let amt=prize[n];

document.getElementById("result").innerText=
"🎯 Number: "+n+" | 💰 ₹"+amt;

document.getElementById("winAmt").innerText=amt;

let profit=collection-amt;
document.getElementById("profit").innerText=profit;

}

/* ADMIN UPDATE */
function updateAdmin(){
document.getElementById("users").innerText=paidUsers;
document.getElementById("collection").innerText=collection;
}

</script>

</body>
</html>
