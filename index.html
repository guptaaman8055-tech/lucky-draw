<script>

let selected=null;
let paid=false;
let users=JSON.parse(localStorage.getItem("users"))||[];
let requests=[];
let drawOpen=false;
let winningNumber=null;

const PRIZE = 50000;

/* Numbers */
let div=document.getElementById("numbers");
for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText="₹"+i;
 btn.className="num";

 if(users.find(u=>u.number===i)) btn.classList.add("taken");

 btn.onclick=()=>{
  if(selected) return alert("Only 1 number allowed");
  if(users.find(u=>u.number===i)) return alert("Already taken");

  selected=i;
  btn.classList.add("selected");
  document.getElementById("chosen").innerText="Selected: "+i;
 };

 div.appendChild(btn);
}

/* Upload Payment */
function upload(){
 let file=document.getElementById("proof").files[0];
 if(!file) return alert("Upload screenshot");

 paid=true;
 document.getElementById("payStatus").innerText="✅ Sent for approval";
}

/* Entry */
function request(){
 let name=document.getElementById("name").value;
 if(!paid) return alert("Payment karo");
 if(!name||!selected) return alert("Fill all");

 requests.push({name,number:selected});
 alert("Request sent to admin");
}

/* Admin */
function login(){
 if(document.getElementById("pass").value==="1234"){
  document.getElementById("admin").style.display="block";
  loadReq();
 }
}

function loadReq(){
 let list=document.getElementById("reqList");
 list.innerHTML="";

 requests.forEach((r,i)=>{
  let li=document.createElement("li");
  li.innerText=r.name+" ("+r.number+")";

  let btn=document.createElement("button");
  btn.innerText="Approve";

  btn.onclick=()=>{
   users.push(r);
   localStorage.setItem("users",JSON.stringify(users));
   requests.splice(i,1);
   location.reload();
  };

  li.appendChild(btn);
  list.appendChild(li);
 });
}

/* TIMER + AUTO DRAW */
let end=new Date().getTime()+120000;

let timerInterval=setInterval(()=>{
 let now=new Date().getTime();
 let d=end-now;

 let s=Math.floor(d/1000);
 document.getElementById("timer").innerText=s+" sec";

 document.getElementById("tick").play();

 if(d<=0){
  clearInterval(timerInterval);
  drawOpen=true;
  document.getElementById("timer").innerText="DRAW OPEN";

  autoDraw(); // 🔥 AUTO RESULT
 }
},1000);

/* AUTO DRAW */
function autoDraw(){
 winningNumber=Math.floor(Math.random()*15)+1;
 spin(); // auto spin
}

/* SPIN */
function spin(){
 if(!drawOpen) return alert("Wait timer");

 document.getElementById("spinSound").play();

 let num=winningNumber || Math.floor(Math.random()*15)+1;
 let deg=3600+(num*24);

 document.getElementById("wheel").style.transform="rotate("+deg+"deg)";

 setTimeout(()=>showWinner(num),4000);
}

/* WINNER */
function showWinner(num){

 let win=users.find(u=>u.number===num);
 let res;

 if(win){
  res="🏆 Winner: "+win.name+" | Number: "+num+" | Prize: ₹"+PRIZE;
  document.getElementById("fire").style.display="block";
  document.getElementById("winSound").play();
 }else{
  res="❌ No Winner | Number: "+num+" | Prize: ₹"+PRIZE;
 }

 document.getElementById("winner").innerText=res;

 let li=document.createElement("li");
 li.innerText=res;
 document.getElementById("results").appendChild(li);
}

/* SAVE RESULT HISTORY */
window.onload=()=>{
 let saved=localStorage.getItem("results");
 if(saved){
  document.getElementById("results").innerHTML=saved;
 }
};

window.onbeforeunload=()=>{
 localStorage.setItem("results",document.getElementById("results").innerHTML);
};

</script>
