<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚡ Ultra Lightning Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

/* GLASS BOX */
.box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* NUMBERS GRID */
.num{
display:inline-block;
width:45px;
height:45px;
line-height:45px;
margin:5px;
border-radius:10px;
background:#1e293b;
cursor:pointer;
transition:0.2s;
}

.num:hover{transform:scale(1.1);}

.active{
background:#22c55e;
}

.light{
background:yellow;
color:black;
box-shadow:0 0 20px yellow;
}

/* BUTTON */
button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* COUNTDOWN CIRCLE */
.circle{
width:80px;
height:80px;
border-radius:50%;
border:5px solid #22c55e;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
margin:auto;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(6px)}
50%{transform:translate(-6px)}
75%{transform:translate(6px)}
100%{transform:translate(0)}
}
.shake{animation:shake 0.4s;}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.win{
font-size:35px;
animation:glow 1s infinite;
}

@keyframes glow{
0%{color:#22c55e;}
50%{color:#facc15;}
100%{color:#22c55e;}
}
</style>
</head>

<body>

<h2>⚡ Ultra Lightning Game</h2>

<div class="box">
🎯 Select Number (0–15)
<div id="nums"></div>
</div>

<div class="box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=UPI-DEMO">
<br><br>
<button>Pay ₹50</button>
</div>

<div class="box">
<div class="circle" id="timer">10</div>
<br>
<button onclick="start()">Start Game</button>
</div>

<div class="box">
<h2 id="result">Result Locked</h2>
<p id="ticket"></p>
</div>

<div id="popup">
<div class="win" id="winText"></div>
</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="thunder" src="https://actions.google.com/sounds/v1/weather/thunder_crack.ogg"></audio>
<audio id="win" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

let selected=null;

/* PRIZE */
const prize={
0:0,1:2000,2:3000,3:2500,4:4000,
5:1500,6:3500,7:5000,8:4500,
9:3000,10:6000,11:2000,
12:3500,13:2500,14:4000,15:5000
};

/* NUMBERS */
let box=document.getElementById("nums");

for(let i=0;i<=15;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="num";

d.onclick=()=>{
document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
selected=i;
};

box.appendChild(d);
}

/* START */
function start(){

if(selected===null){
alert("Select number first");
return;
}

let count=10;

let t=setInterval(()=>{
timer.innerText=count;
tick.play();
count--;

if(count<0){
clearInterval(t);
lightning();
}

},1000);
}

/* LIGHTNING WAVE */
function lightning(){

document.body.classList.add("shake");
thunder.play();

let nums=document.querySelectorAll(".num");

let i=0;

let run=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

nums[i%16].classList.add("light");

i++;

if(i>40){
clearInterval(run);

let winNum=Math.floor(Math.random()*16);
show(winNum);
}

},80);
}

/* RESULT */
function show(n){

document.body.classList.remove("shake");

let amt=prize[n];
let ticketId="UL-"+Math.floor(Math.random()*999999);

result.innerText="🎯 "+n+" | 💰 ₹"+amt;
ticket.innerText="🎟 "+ticketId;

win.play();

popup.style.display="flex";
winText.innerText="💥 BIG WIN ₹"+amt;

setTimeout(()=>popup.style.display="none",3000);
}

</script>

</body>
</html>
