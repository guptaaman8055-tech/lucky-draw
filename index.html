  <!DOCTYPE html>
<html>
<head>
<title>Lucky Draw Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
  font-family: Arial;
}

.box {
  margin-top: 50px;
}

input {
  padding: 12px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 5px;
  border: none;
  margin: 5px;
  cursor: pointer;
}

.pay { background: orange; }
.add { background: green; }
.win { background: #28a745; }

#formBox { display:none; margin-top:20px; }
</style>
</head>

<body>

<div class="box">
<h2>🎉 Lucky Draw Pro</h2>

<input id="name" placeholder="Enter Name">
<button class="add" onclick="addName()">Add</button>

<ul id="list"></ul>

<br>

<button class="pay" onclick="payNow()">Pay ₹50</button>

<div id="formBox">
<h3>Fill Details</h3>

<!-- 🔴 APNA GOOGLE FORM LINK YAHA DALO -->
<iframe src="https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true"
width="100%" height="400"></iframe>

</div>

<br>

<button class="win" onclick="pickWinner()">Pick Winner</button>

<h3 id="winner"></h3>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

let users = [];
let paidUsers = [];

function payNow(){

let options = {
"key": "YOUR_KEY_HERE",
"amount": 5000,
"currency": "INR",
"name": "Lucky Draw Pro",
"description": "Entry Fee",

"handler": function (){

alert("Payment Success ✅");

localStorage.setItem("paid","yes");

document.getElementById("formBox").style.display="block";
}
};

let rzp = new Razorpay(options);
rzp.open();
}


function addName(){

if(localStorage.getItem("paid") !== "yes"){
alert("⚠️ पहले payment करो");
return;
}

let name = document.getElementById("name").value;

if(name===""){
alert("Enter name");
return;
}

let ticket = "LD-"+Math.floor(Math.random()*10000);

users.push({name,ticket});

let li = document.createElement("li");
li.innerText = name + " (Ticket: "+ticket+")";

document.getElementById("list").appendChild(li);

document.getElementById("name").value="";
}


function pickWinner(){

if(users.length==0){
alert("No users");
return;
}

let winner = users[Math.floor(Math.random()*users.length)];

document.getElementById("winner").innerText =
"🏆 Winner: "+winner.name+" ("+winner.ticket+")";
}

</script>

</body>
</html>
