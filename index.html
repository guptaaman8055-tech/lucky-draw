    <!DOCTYPE html>
<html>
<head>
<title>Lucky Draw Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#000428,#004e92);
  color:white;
  text-align:center;
}

.container { padding:20px; }

.card {
  background:#1c1c1c;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

input {
  padding:12px;
  border:none;
  border-radius:5px;
}

button {
  padding:12px;
  border:none;
  border-radius:5px;
  margin:5px;
  font-weight:bold;
  cursor:pointer;
}

.pay { background:orange; }
.add { background:green; }
.win { background:#00c853; }

#formBox { display:none; }

.status { font-size:18px; }
</style>
</head>

<body>

<div class="container">

<h2>🎉 Lucky Draw Pro Max</h2>

<div class="card">
<input id="name" placeholder="Enter Name">
<button class="add" onclick="addName()">Add Entry</button>

<ul id="list"></ul>
</div>

<div class="card">
<button class="pay" onclick="payNow()">Pay ₹50</button>

<p class="status" id="status">❌ Payment Required</p>

<!-- SIMPLE UPI BACKUP -->
<a href="upi://pay?pa=yourupi@upi&pn=LuckyDraw&am=50&cu=INR">
<button>Pay via UPI</button>
</a>
</div>

<div id="formBox" class="card">
<h3>📋 Fill Details</h3>

<iframe src="https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true"
width="100%" height="400"></iframe>

</div>

<div class="card">
<button class="win" onclick="pickWinner()">🎯 Pick Winner</button>
<h3 id="winner"></h3>
</div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let paid = localStorage.getItem("paid") || "no";

// LOAD UI
function loadUI(){
document.getElementById("list").innerHTML="";

users.forEach(u=>{
let li=document.createElement("li");
li.innerText=u.name+" (Ticket:"+u.ticket+")";
document.getElementById("list").appendChild(li);
});

if(paid==="yes"){
document.getElementById("status").innerText="✅ Payment Done";
document.getElementById("formBox").style.display="block";
}
}

loadUI();

// PAYMENT
function payNow(){

let options={
"key":"YOUR_RAZORPAY_KEY",
"amount":5000,
"currency":"INR",
"name":"Lucky Draw",
"description":"Entry Fee",

"handler":function(){

alert("✅ Payment Successful");

paid="yes";
localStorage.setItem("paid","yes");

loadUI();
}
};

let rzp=new Razorpay(options);
rzp.open();
}

// ADD ENTRY
function addName(){

if(paid!=="yes"){
alert("⚠️ पहले payment करो");
return;
}

let name=document.getElementById("name").value;

if(name===""){
alert("Enter name");
return;
}

// duplicate block
if(users.find(u=>u.name===name)){
alert("Already added");
return;
}

let ticket="LD-"+Math.floor(Math.random()*10000);

users.push({name,ticket});
localStorage.setItem("users",JSON.stringify(users));

loadUI();

document.getElementById("name").value="";
}

// WINNER
function pickWinner(){

if(users.length===0){
alert("No entries");
return;
}

let winner=users[Math.floor(Math.random()*users.length)];

document.getElementById("winner").innerText=
"🏆 Winner: "+winner.name+" ("+winner.ticket+")";
}

</script>

</body>
</html>
