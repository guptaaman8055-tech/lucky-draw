<!DOCTYPE html>
<html>
<head>
  <title>Lucky Draw</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      font-size: 28px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      background: green;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: darkgreen;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 5px;
    }

    iframe {
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }

    #winner {
      margin-top: 20px;
      font-size: 20px;
      color: gold;
    }
  </style>
</head>

<body>

<h2>🎉 Lucky Draw</h2>

<input type="text" id="name" placeholder="Enter name">
<button onclick="addName()">Add</button>

<ul id="list"></ul>

<br>

<!-- PAYMENT BUTTON -->
<button onclick="payNow()">Pay ₹50</button>

<br><br>

<!-- GOOGLE FORM -->
<h3>Fill Details</h3>

<iframe 
src="https://docs.google.com/forms/d/e/1FAIpQLSdEXAMPLE_FORM_LINK/viewform?embedded=true" 
width="100%" height="500">
</iframe>

<br>

<button onclick="pickWinner()">Pick Winner</button>

<h3 id="winner"></h3>

<script>
let users = [];

// ADD NAME
function addName(){
  let name = document.getElementById("name").value;

  if(name===""){
    alert("Enter name");
    return;
  }

  let ticket = "LD-" + Math.floor(1000 + Math.random()*9000);

  users.push({name: name, ticket: ticket});

  let li = document.createElement("li");
  li.innerText = name + " (Ticket: " + ticket + ")";

  document.getElementById("list").appendChild(li);
  document.getElementById("name").value = "";
}

// PAYMENT (DEMO)
function payNow(){
  alert("Payment system coming soon!");
}

// PICK WINNER
function pickWinner(){
  if(users.length===0){
    alert("No users");
    return;
  }

  let random = Math.floor(Math.random()*users.length);
  let winner = users[random];

  document.getElementById("winner").innerText =
    "🏆 Winner: " + winner.name + " (Ticket: " + winner.ticket + ")";
}
</script>

</body>
</html>
