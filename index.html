<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIP Wheel Pro</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
}

/* WHEEL */
#wheel{
width:260px;
height:260px;
border-radius:50%;
margin:30px auto;
border:8px solid gold;
box-shadow:0 0 25px gold;
position:relative;
transition:transform 4s cubic-bezier(.17,.67,.83,.67);
}

/* SLICES */
.slice{
position:absolute;
width:100%;
height:100%;
clip-path: polygon(50% 50%, 100% 0, 100% 100%);
border-radius:50%;
display:flex;
justify-content:flex-end;
padding-right:10px;
font-size:12px;
font-weight:bold;
}

/* POINTER */
#pointer{
font-size:30px;
}

/* BUTTON */
button{
padding:12px 25px;
background:gold;
border:none;
border-radius:10px;
font-size:18px;
}

/* RESULT */
#result{
margin-top:10px;
font-size:20px;
}

/* HISTORY */
#history{
margin-top:15px;
background:#111;
padding:10px;
border-radius:10px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.win{
font-size:35px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}
</style>
</head>

<body>

<h2>🎡 VIP Spin Wheel</h2>
<div id="pointer">▼</div>

<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<div id="result">---</div>

<div id="history">📊 History: </div>

<div id="popup">
<div class="win" id="win"></div>
</div>

<!-- SOUND -->
<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

/* CREATE WHEEL */
let wheel=document.getElementById("wheel");

for(let i=0;i<16;i++){
let div=document.createElement("div");
div.className="slice";
div.style.transform="rotate("+(i*22.5)+"deg)";
div.style.background="hsl("+(i*22.5)+",70%,50%)";
div.innerHTML=i;
wheel.appendChild(div);
}

/* HISTORY ARRAY */
let history=[];

/* SPIN */
function spin(){

document.getElementById("spinSound").play();

/* VIBRATION */
if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}

/* RANDOM */
let num=Math.floor(Math.random()*16);

/* ROTATE */
let deg=3600+(num*22.5);
wheel.style.transform="rotate("+deg+"deg)";

/* RESULT */
setTimeout(()=>{
show(num);
},4000);
}

/* RESULT */
function show(n){

document.getElementById("result").innerText="🎯 "+n;

/* SOUND */
document.getElementById("winSound").play();

/* VIBRATE */
if(navigator.vibrate){
navigator.vibrate(300);
}

/* HISTORY UPDATE */
history.unshift(n);
if(history.length>5) history.pop();

document.getElementById("history").innerText=
"📊 History: "+history.join(" | ");

/* POPUP */
let popup=document.getElementById("popup");
let win=document.getElementById("win");

win.innerText="💥 "+n;
popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
},2500);
}

</script>

</body>
</html>
