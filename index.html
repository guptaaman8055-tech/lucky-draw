<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIP Lightning Game</title>

<style>
body{
margin:0;
background:#0b0f1a;
font-family:sans-serif;
color:#fff;
text-align:center;
}

/* TOP */
.top{
display:flex;
justify-content:space-between;
padding:10px;
}

.balance{color:#22c55e;}

/* TIMER */
.timer{
width:70px;
height:70px;
border-radius:50%;
border:6px solid #333;
border-top:6px solid gold;
margin:auto;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
padding:10px;
}

.num{
padding:16px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.red{background:#b91c1c;}
.black{background:#111;}
.green{background:#15803d;}

.active{
outline:2px solid yellow;
}

.light{
transform:scale(1.2);
box-shadow:0 0 20px gold;
}

/* RESULT */
#result{
font-size:22px;
margin:10px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.win{
font-size:35px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:gold;}
50%{color:red;}
100%{color:gold;}
}
</style>

</head>
<body>

<div class="top">
<div class="balance" id="bal">💰 ₹1000</div>
</div>

<h3>⚡ DEMO GAME</h3>

<div class="timer" id="timer">10</div>

<div class="grid" id="grid"></div>

<div id="result">Select Number</div>

<div id="popup">
<div class="win" id="win"></div>
</div>

<script>

/* DATA */
let multipliers=[
1,2,5,10,3,
2,8,4,6,12,
2,3,15,5,20,
1,7,9,2,11
];

let balance=1000;
let bet=50;
let selected=null;
let locked=false;

/* CREATE GRID */
let grid=document.getElementById("grid");

for(let i=1;i<=20;i++){

let d=document.createElement("div");
d.className="num";

/* COLOR */
if(i%3==0) d.classList.add("green");
else if(i%2==0) d.classList.add("red");
else d.classList.add("black");

/* TEXT */
d.innerHTML=i+"<br>"+multipliers[i-1]+"x";

/* CLICK */
d.onclick=()=>{
if(locked) return;

document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
selected=i;
};

grid.appendChild(d);
}

/* TIMER */
let time=10;

function startTimer(){

locked=false;

let t=setInterval(()=>{

timer.innerText=time;
time--;

if(time<0){
clearInterval(t);
run();
}

},1000);
}

/* RUN */
function run(){

locked=true;

let nums=document.querySelectorAll(".num");
let i=0;
let speed=40;

let loop=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

let index=i%20;
nums[index].classList.add("light");

i++;

if(i>40) speed+=5;

if(i>80){
clearInterval(loop);

let winNum=Math.floor(Math.random()*20)+1;
show(winNum);
}

},speed);
}

/* RESULT */
function show(n){

let multi=multipliers[n-1];
let resultText="";

/* WIN/LOSS */
if(selected===n){
let winAmt=bet*multi;
balance+=winAmt;
resultText="🎯 WIN ₹"+winAmt;
}else{
balance-=bet;
resultText="❌ LOSS ₹"+bet;
}

bal.innerText="💰 ₹"+balance;
result.innerText=resultText;

/* POPUP */
let popup=document.getElementById("popup");
let win=document.getElementById("win");

win.innerText=resultText;
popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
next();
},2000);
}

/* NEXT ROUND */
function next(){
time=10;
selected=null;
document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
startTimer();
}

/* START */
startTimer();

</script>

</body>
</html>
