<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Draw System</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}

.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}
.win{background:gold;color:black;font-weight:bold;}

#wheel{
width:250px;height:250px;border-radius:50%;
border:8px solid white;margin:20px auto;
position:relative;overflow:hidden;
}

.slice{
position:absolute;width:50%;height:50%;
top:50%;left:50%;
transform-origin:0 0;
display:flex;align-items:center;justify-content:center;
font-size:12px;font-weight:bold;
}
</style>
</head>

<body>

<h2>🎉 Lucky Draw</h2>

<!-- PAYMENT -->
<div class="box">
<h3>💳 Pay ₹50</h3>

<a href="upi://pay?pa=guptaaman8055-3@okaxis&pn=Aman%20Gupta&am=50&cu=INR">
<button>Pay via UPI</button>
</a>

<br><br>
<button onclick="showQR()">Show QR</button>
<br><br>
<img id="qr" src="qr.png" width="150" style="display:none">

<p id="status">❌ Payment not submitted</p>
</div>

<!-- UPLOAD -->
<div class="box">
<h3>📤 Upload Screenshot</h3>
<input type="file" id="proof">
<button onclick="submitProof()">Submit</button>
</div>

<!-- USER -->
<div class="box">
<input id="name" placeholder="Name">
</div>

<!-- NUMBERS -->
<div class="box">
<h3>Select Number</h3>
<div id="numbers"></div>
</div>

<!-- ENTRY -->
<div class="box">
<button onclick="enter()">Join Draw</button>
</div>

<!-- ADMIN -->
<div class="box">
<input type="password" id="pass" placeholder="Admin Password">
<button onclick="login()">Login</button>
<div id="admin" style="display:none">
<ul id="list"></ul>
</div>
</div>

<!-- WHEEL -->
<div class="box">
<div id="wheel"></div>
<button onclick="spin()">Spin</button>
</div>

<h2 id="winner"></h2>

<ul id="history"></ul>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];
let requests=JSON.parse(localStorage.getItem("req"))||[];
let approved=JSON.parse(localStorage.getItem("ok"))||[];
let selected=null;

/* QR */
function showQR(){
 document.getElementById("qr").style.display="block";
}

/* NUMBERS */
let div=document.getElementById("numbers");
for(let i=1;i<=15;i++){
 let b=document.createElement("button");
 b.innerText=i;
 b.className="num";

 if(users.find(u=>u.number==i)) b.classList.add("taken");

 b.onclick=()=>{
  if(selected) return alert("Only one");
  selected=i;
  b.classList.add("selected");
 };

 div.appendChild(b);
}

/* PROOF */
function submitProof(){
 let file=document.getElementById("proof").files[0];
 let name=document.getElementById("name").value;

 let r=new FileReader();
 r.onload=()=>{
  requests.push({name,img:r.result});
  localStorage.setItem("req",JSON.stringify(requests));
  alert("Waiting approval");
 };
 r.readAsDataURL(file);
}

/* ADMIN */
function login(){
 if(document.getElementById("pass").value=="1234"){
  document.getElementById("admin").style.display="block";
  load();
 }
}

function load(){
 let list=document.getElementById("list");
 list.innerHTML="";

 requests.forEach((r,i)=>{
  let li=document.createElement("li");

  let img=document.createElement("img");
  img.src=r.img;
  img.width=80;

  let btn=document.createElement("button");
  btn.innerText="Approve";

  btn.onclick=()=>{
   approved.push(r.name);
   requests.splice(i,1);
   localStorage.setItem("ok",JSON.stringify(approved));
   localStorage.setItem("req",JSON.stringify(requests));
   load();
  };

  li.innerText=r.name;
  li.appendChild(img);
  li.appendChild(btn);
  list.appendChild(li);
 });
}

/* ENTRY */
function enter(){
 let name=document.getElementById("name").value;

 if(!approved.includes(name)) return alert("Not approved");

 users.push({name,number:selected});
 localStorage.setItem("users",JSON.stringify(users));
 location.reload();
}

/* WHEEL */
let wheel=document.getElementById("wheel");

for(let i=1;i<=15;i++){
 let s=document.createElement("div");
 s.className="slice";
 s.style.transform="rotate("+(i*24)+"deg) skewY(66deg)";
 s.style.background="hsl("+(i*24)+",70%,40%)";
 s.innerText="₹"+i;
 wheel.appendChild(s);
}

/* SPIN */
function spin(){
 let deg=3600+Math.random()*360;
 wheel.style.transition="4s";
 wheel.style.transform="rotate("+deg+"deg)";

 setTimeout(()=>{
  let num=Math.floor(Math.random()*15)+1;
  let win=users.find(u=>u.number==num);

  let res=win?win.name+" wins ("+num+")":"No Winner "+num;

  document.getElementById("winner").innerText=res;

  let li=document.createElement("li");
  li.innerText=res;
  document.getElementById("history").appendChild(li);

 },4000);
}

</script>

</body>
</html>
