<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Ticket Gallery</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:#070b16;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

.header{
text-align:center;
padding:25px 15px;
border-radius:20px;
background:linear-gradient(135deg,#111827,#312e81);
box-shadow:0 0 30px rgba(124,58,237,.3);
}

.header h1{
margin:0;
font-size:28px;
color:#ffd700;
}

.header p{
color:#cbd5e1;
}

.tickets{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-top:20px;
}

.ticket{
position:relative;
overflow:hidden;
padding:15px;
border-radius:16px;
background:
linear-gradient(135deg,#172554,#4c1d95);
border:1px solid rgba(255,215,0,.5);
box-shadow:0 8px 20px rgba(0,0,0,.35);
transition:.3s;
}

.ticket:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:
0 0 25px rgba(255,215,0,.35);
}

.ticket:before{
content:"";
position:absolute;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,.06);
right:-30px;
top:-30px;
}

.ticket-top{
display:flex;
justify-content:space-between;
font-size:12px;
color:#cbd5e1;
}

.ticket-icon{
font-size:35px;
text-align:center;
margin:12px 0;
}

.ticket-number{
text-align:center;
font-size:24px;
font-weight:bold;
color:#ffd700;
letter-spacing:2px;
}

.ticket-code{
text-align:center;
font-size:11px;
color:#94a3b8;
margin-top:6px;
}

.ticket-line{
border-top:1px dashed #ffd700;
margin:12px 0;
}

.status{
text-align:center;
font-size:12px;
color:#86efac;
}

button{
display:block;
margin:20px auto 0;
padding:13px 25px;
border:0;
border-radius:10px;
background:#ffd700;
color:#111;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#facc15;
}

.selected{
outline:3px solid #22c55e;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.04);
box-shadow:0 0 30px #22c55e;
}
}

.result{
display:none;
margin-top:20px;
padding:20px;
border-radius:15px;
text-align:center;
background:#172033;
border:1px solid #ffd700;
}

.result h2{
color:#ffd700;
}

.note{
text-align:center;
color:#64748b;
font-size:12px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>🎟️ PREMIUM TICKET GALLERY</h1>

<p>
Explore 100 Virtual Tickets
</p>

<button onclick="selectRandomTicket()">
✨ Select Demo Ticket
</button>

</div>

<div id="tickets"
class="tickets">
</div>

<div id="result"
class="result">

<h2>🎉 Selected Ticket</h2>

<p id="selectedTicket"></p>

</div>

<p class="note">
Virtual entertainment demo only.
These tickets have no real monetary value.
</p>

</div>


<script>

const box =
document.getElementById("tickets");

for(let i=1;i<=100;i++){

let ticket =
document.createElement("div");

ticket.className="ticket";

ticket.id=
"ticket-"+i;

let number =
String(i).padStart(3,"0");

let code =
"LT-"+Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

ticket.innerHTML=`

<div class="ticket-top">
<span>PREMIUM</span>
<span>2026</span>
</div>

<div class="ticket-icon">
🎟️
</div>

<div class="ticket-number">
#${number}
</div>

<div class="ticket-code">
CODE: ${code}
</div>

<div class="ticket-line"></div>

<div class="status">
● ACTIVE DEMO TICKET
</div>

`;

box.appendChild(ticket);

}


function selectRandomTicket(){

document
.querySelectorAll(".ticket")
.forEach(t=>{
t.classList.remove("selected");
});

let number =
Math.floor(
Math.random()*100
)+1;

let ticket =
document.getElementById(
"ticket-"+number
);

ticket.classList.add(
"selected"
);

document.getElementById(
"selectedTicket"
).innerText=
"🎟️ Ticket #"+
String(number)
.padStart(3,"0");

document.getElementById(
"result"
).style.display=
"block";

ticket.scrollIntoView({
behavior:"smooth",
block:"center"
});

}

</script>

</body>
</html>
