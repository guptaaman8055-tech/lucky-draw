<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultimate Lucky Draw</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.num{background:#334155;color:white;}
.selected{background:#22c55e;}
.taken{background:red;}
#wheel{
width:220px;height:220px;border-radius:50%;
border:8px solid white;margin:20px auto;
display:flex;align-items:center;justify-content:center;
font-size:20px;
transition:transform 3s;
}
</style>
</head>

<body>

<h2>🎉 Ultimate Lucky Draw</h2>

<div class="box">
<h3>💰 Entry ₹50 | 🏆 Win up to ₹50000</h3>
</div>

<!-- TIMER -->
<div class="box">
<h3>⏳ Countdown</h3>
<h2 id="timer"></h2>
</div>

<!-- PAYMENT -->
<div class="box">
<h3>💳 Payment</h3>
<button onclick="pay()">Pay ₹50</button>
<p id="payStatus">❌ Not Paid</p>
</div>

<!-- USER -->
<div class="box">
<input id="name" placeholder="Enter Name">
</div>

<!-- NUMBERS -->
<div class="box">
<h3>Select Number</h3>
<div id="numbers"></div>
</div>

<!-- ENTRY -->
<div class="box">
<button onclick="request()">Submit Entry</button>
</div>

<!-- ADMIN -->
<div class="box">
<h3>Admin Panel</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<ul id="reqList"></ul>
</div>
</div>

<!-- SPIN -->
<div class="box">
<div id="wheel">SPIN</div>
<button onclick="spin()">Spin</button>
</div>

<!-- DRAW -->
<div class="box">
<button onclick="draw()">Draw Winner</button>
<h2 id="winner"></h2>
</div>

<!-- RESULT -->
<div class="box">
<ul id="results"></ul>
</div>

<script>

// 🔴 Firebase config
const firebaseConfig = {
 apiKey:"YOUR_KEY",
 authDomain:"YOUR_DOMAIN",
 databaseURL:"YOUR_DB",
 projectId:"YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selected=null;
let paid=false;
let drawOpen=false;

/* Numbers */
for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText=i;
 btn.className="num";

 btn.onclick=()=>{selected=i; btn.classList.add("selected");};

 document.getElementById("numbers").appendChild(btn);
}

/* Payment (Demo / Razorpay ready) */
function pay(){
 paid=true;
 document.getElementById("payStatus").innerText="✅ Paid";
 // Razorpay integration yahan add hoga
}

/* Request Entry */
function request(){
 let name=document.getElementById("name").value;
 if(!paid) return alert("Pay first");
 if(!name||!selected) return alert("Fill all");

 db.ref("requests/"+Date.now()).set({name,number:selected});
 alert("Request sent");
}

/* Admin */
function login(){
 if(document.getElementById("pass").value==="1234"){
  document.getElementById("admin").style.display="block";
  loadReq();
 }
}

function loadReq(){
 db.ref("requests").on("value",snap=>{
  let data=snap.val()||{};
  let list=document.getElementById("reqList");
  list.innerHTML="";

  Object.entries(data).forEach(([id,r])=>{
   let li=document.createElement("li");
   li.innerText=r.name+" ("+r.number+")";

   let btn=document.createElement("button");
   btn.innerText="Approve";

   btn.onclick=()=>{
    db.ref("users/"+r.number).set(r);
    db.ref("requests/"+id).remove();
   };

   li.appendChild(btn);
   list.appendChild(li);
  });
 });
}

/* Spin */
function spin(){
 let w=document.getElementById("wheel");
 let deg=3600+Math.random()*1000;
 w.style.transform="rotate("+deg+"deg)";
}

/* Draw */
function draw(){
 if(!drawOpen) return alert("Timer not finished");

 let num=Math.floor(Math.random()*15)+1;

 db.ref("users/"+num).once("value",snap=>{
  let res;

  if(snap.exists()){
   res="🏆 "+snap.val().name+" (No:"+num+")";
  } else {
   res="No Winner ("+num+")";
  }

  document.getElementById("winner").innerText=res;

  let li=document.createElement("li");
  li.innerText=res;
  document.getElementById("results").appendChild(li);
 });
}

/* Timer */
let end=new Date().getTime()+300000;

setInterval(()=>{
 let now=new Date().getTime();
 let d=end-now;

 let m=Math.floor(d/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("timer").innerText=m+"m "+s+"s";

 if(d<=0){
  drawOpen=true;
  document.getElementById("timer").innerText="DRAW OPEN";
 }
},1000);

</script>

</body>
  </html>
