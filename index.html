<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lightning Lucky Draw</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.box{
background:#0f172a;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
}

.num{
display:inline-block;
padding:12px;
margin:4px;
background:#1e293b;
border-radius:6px;
cursor:pointer;
}

.active{background:#22c55e;}
.light{
background:yellow;
color:black;
box-shadow:0 0 15px yellow;
}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
75%{transform:translate(5px)}
100%{transform:translate(0)}
}
.shake{animation:shake 0.4s;}

#popup{
display:none;
position:fixed;
top:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
font-size:30px;
color:yellow;
}
</style>
</head>

<body>

<h2>⚡ Lightning Lucky Draw</h2>

<div class="box">
💰 Prize ₹50000 <br>
🎟 Entry ₹50 <br>
🆔 Draw ID: LD2026
</div>

<!-- LOGIN -->
<div class="box">
<input id="mobile" placeholder="Mobile"><br>
<input id="pass" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- PAYMENT -->
<div class="box">
<h3>💳 Payment</h3>

<img src="YOUR_QR_IMAGE_LINK_HERE" width="200"><br>

<input id="utr" placeholder="Enter UTR"><br>
<button onclick="pay()">Submit Payment</button>

<p id="status">Status: Pending</p>
</div>

<!-- NUMBERS -->
<div class="box">
<h3>Select Number (0–15)</h3>
<div id="nums"></div>
</div>

<!-- ADMIN -->
<div class="box">
<h3>🎮 Admin Control</h3>
<button onclick="start()">Start Draw</button>
</div>

<!-- TIMER -->
<div class="box">
<h2 id="timer">Ready</h2>
</div>

<!-- RESULT -->
<div class="box">
<h2 id="result">Waiting...</h2>
<p id="ticket"></p>
</div>

<div id="popup">💥 BIG WIN 💥</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="thunder" src="https://actions.google.com/sounds/v1/weather/thunder_crack.ogg"></audio>
<audio id="win" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

let logged=false;
let paid=false;
let selected=null;

const prize={
0:0,1:2000,2:3000,3:2500,4:4000,
5:1500,6:3500,7:5000,8:4500,
9:3000,10:6000,11:2000,
12:3500,13:2500,14:4000,15:5000
};

/* CREATE NUMBERS */
for(let i=0;i<=15;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="num";

d.onclick=()=>{
if(!logged) return alert("Login First");
if(!paid) return alert("Pay First");

document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
selected=i;
};

nums.appendChild(d);
}

/* LOGIN */
function login(){
if(mobile.value && pass.value){
logged=true;
alert("Login Success");
}else{
alert("Fill all fields");
}
}

/* PAYMENT */
function pay(){
let u=utr.value;
if(u.length<5) return alert("Enter valid UTR");

paid=true;
status.innerText="Payment Success ✅";
}

/* START DRAW (ADMIN ONLY STYLE) */
function start(){

if(!logged || !paid || selected==null){
alert("Complete all steps");
return;
}

let count=10;

let t=setInterval(()=>{
timer.innerText="⏳ "+count;
tick.play();
count--;

if(count<0){
clearInterval(t);
lightning();
}
},1000);

}

/* LIGHTNING EFFECT */
function lightning(){

document.body.classList.add("shake");
thunder.play();

let all=document.querySelectorAll(".num");

let i=0;

let run=setInterval(()=>{
all.forEach(n=>n.classList.remove("light"));

let r=Math.floor(Math.random()*16);
all[r].classList.add("light");

i++;

if(i>20){
clearInterval(run);
resultShow(r);
}
},100);

}

/* RESULT */
function resultShow(n){

let amt=prize[n];

result.innerText="🎯 Number: "+n+" | ₹"+amt;

let ticketId="TICKET-"+Math.floor(Math.random()*999999);
ticket.innerText="🎟 "+ticketId;

win.play();

popup.style.display="flex";

setTimeout(()=>{
popup.style.display="none";
},3000);

}

</script>

</body>
</html>
