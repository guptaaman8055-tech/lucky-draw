<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lightning Demo Game</title>

<style>
body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

.box{
background:#0f172a;
padding:15px;
margin:10px;
border-radius:10px;
}

.num{
display:inline-block;
padding:12px;
margin:4px;
background:#1e293b;
border-radius:6px;
cursor:pointer;
}

.active{
background:#22c55e;
}

.light{
background:yellow;
color:black;
box-shadow:0 0 15px yellow;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
75%{transform:translate(5px)}
100%{transform:translate(0)}
}

.shake{
animation:shake 0.4s;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.flash{
font-size:35px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{color:#22c55e;}
50%{color:#facc15;}
100%{color:#22c55e;}
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
}
</style>

</head>

<body>

<h2>⚡ Lightning Lucky Game (Demo)</h2>

<div class="box">
🎯 Select Number (0–15)
<div id="nums"></div>
</div>

<div class="box">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=DemoQR" width="150"><br>
<button>Pay ₹50 (Demo)</button>
</div>

<div class="box">
<h2 id="timer">Press Start</h2>
<button onclick="start()">Start</button>
</div>

<div class="box">
<h2 id="result">Result Locked</h2>
</div>

<div id="popup">
<h1 id="winText"></h1>
</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="thunder" src="https://actions.google.com/sounds/v1/weather/thunder_crack.ogg"></audio>
<audio id="win" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<script>

let selected=null;

/* NUMBERS */
let box=document.getElementById("nums");

for(let i=0;i<=15;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="num";

d.onclick=()=>{
document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
d.classList.add("active");
selected=i;
};

box.appendChild(d);
}

/* START */
function start(){

if(selected===null){
alert("Select number first");
return;
}

let count=10;

let t=setInterval(()=>{
timer.innerText="⏳ "+count;

tick.play();

count--;

if(count<0){
clearInterval(t);
lightning();
}

},1000);
}

/* LIGHTNING EFFECT */
function lightning(){

document.body.classList.add("shake");
thunder.play();

let nums=document.querySelectorAll(".num");

let i=0;

let run=setInterval(()=>{

nums.forEach(n=>n.classList.remove("light"));

let rand=Math.floor(Math.random()*16);
nums[rand].classList.add("light");

i++;

if(i>20){
clearInterval(run);

let winNum=rand;
show(winNum);
}

},100);
}

/* RESULT */
function show(n){

document.body.classList.remove("shake");

result.innerText="🎯 Number: "+n;

win.play();

popup.style.display="flex";
winText.innerText="💥 BIG WIN: "+n;
winText.className="flash";

setTimeout(()=>popup.style.display="none",3000);
}

</script>

</body>
</html>
