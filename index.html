<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultra Pro Lucky Draw</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:10px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;}
.num{background:#334155;color:white;}
.taken{background:red;}
.selected{background:#22c55e;}
</style>
</head>

<body>

<h2>🎉 Ultra Pro Lucky Draw</h2>

<div class="box">
<input id="name" placeholder="Enter name">
</div>

<div class="box" id="numbers"></div>

<div class="box">
<button onclick="book()">Book Number</button>
</div>

<div class="box">
<button onclick="draw()">🎯 Draw Winner</button>
<h2 id="winner"></h2>
</div>

<script>

// 🔴 Firebase config yahan paste karo
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selected=null;

/* Numbers */
for(let i=1;i<=15;i++){
 let btn=document.createElement("button");
 btn.innerText=i;
 btn.className="num";
 btn.onclick=()=>selected=i;
 document.getElementById("numbers").appendChild(btn);
}

/* Book */
function book(){
 let name=document.getElementById("name").value;
 if(!name||!selected) return alert("Fill all");

 db.ref("users/"+selected).once("value",snap=>{
  if(snap.exists()) return alert("Already booked");

  db.ref("users/"+selected).set({
    name:name,
    number:selected
  });
  alert("Booked!");
 });
}

/* Draw */
function draw(){
 let num=Math.floor(Math.random()*15)+1;

 db.ref("users/"+num).once("value",snap=>{
  if(snap.exists()){
    document.getElementById("winner").innerText =
      "🏆 "+snap.val().name+" (No: "+num+")";
  } else {
    document.getElementById("winner").innerText =
      "No Winner (No: "+num+")";
  }
 });
}

</script>

</body>
</html>
